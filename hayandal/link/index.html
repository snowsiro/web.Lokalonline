<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hayandal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#0a0a0a;display:flex;align-items:center;justify-content:center;font-family:system-ui,sans-serif;padding:24px}
.card{width:100%;max-width:400px}
.logo{width:80px;height:80px;border-radius:50%;object-fit:cover;margin:0 auto 16px;display:block;background:#222}
.name{color:#fff;font-size:22px;font-weight:700;text-align:center;margin-bottom:4px}
.sub{color:rgba(255,255,255,.45);font-size:14px;text-align:center;margin-bottom:32px}
.link-btn{display:flex;align-items:center;gap:14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#fff;text-decoration:none;padding:16px 20px;border-radius:12px;margin-bottom:10px;font-size:15px;transition:background .2s,border-color .2s}
.link-btn:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.25)}
.link-icon{font-size:20px;flex-shrink:0;width:28px;text-align:center}
.footer{text-align:center;margin-top:28px;font-size:11px;color:rgba(255,255,255,.2)}
</style>
</head>
<body>
<div class="card">
  <img class="logo" src="img/logo.png" onerror="this.style.display='none'">
  <div class="name">Hayandal</div>
  <div class="sub" id="subtext">Wien</div>
  <div id="links">
      <a href="https://web.lokalonline.at/hayandal/" class="link-btn" target="_blank"><span class="link-icon">🌐</span><span>Website</span></a>
      <a href="https://web.lokalonline.at/hayandal/menu/" class="link-btn" target="_blank"><span class="link-icon">📋</span><span>Speisekarte / Leistungen</span></a>
      <a href="tel:+4367763107304" class="link-btn" target="_blank"><span class="link-icon">📞</span><span>+4367763107304</span></a>
      <a href="https://instagram.com/hayandal" class="link-btn" target="_blank"><span class="link-icon">📸</span><span>@hayandal</span></a>
      <a href="https://maps.google.com/?q=Singerstrasse%2030" class="link-btn" target="_blank"><span class="link-icon">📍</span><span>Singerstrasse 30</span></a>
  </div>
  <div class="footer">lokalonline.at</div>
</div>
<script>
var d=document.getElementById("subtext");
if(d&&"Singerstrasse 30")d.textContent="Singerstrasse 30";
</script>
</body>
</html>
