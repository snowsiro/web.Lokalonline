<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Sortiment</title>
  <meta name="description" id="page-desc" content="">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #E85D26;
      --accent:  #E85D26;
      --bg:      #FFFFFF;
      --dark:    #0A0A0A;
      --mid:     #6B6B6B;
      --dim:     #9A9A9A;
      --line:    #E8E8E8;
      --font-heading: 'Space Grotesk', system-ui, sans-serif;
      --font-body:    'Inter', system-ui, sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--dark);
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ── ANNOUNCEMENT BAR ── */
    #ann-bar {
      background: var(--dark);
      color: rgba(255,255,255,.75);
      font-family: var(--font-heading);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .1em;
      text-transform: uppercase;
      text-align: center;
      padding: 10px 20px;
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1001;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── NAV ── */
    #main-nav {
      position: fixed;
      top: 36px; left: 0; right: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      height: 64px;
      background: rgba(255,255,255,.97);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
    }

    .nav-logo {
      font-family: var(--font-heading);
      font-size: 17px;
      font-weight: 700;
      color: var(--dark);
      text-decoration: none;
      letter-spacing: -.01em;
      text-transform: uppercase;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .nav-back {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--mid);
      text-decoration: none;
      font-size: 13px;
      font-family: var(--font-heading);
      font-weight: 500;
      letter-spacing: .04em;
      transition: color .2s;
    }
    .nav-back:hover { color: var(--primary); }

    .lang-bar {
      display: flex;
      align-items: center;
      gap: 2px;
    }
    .lang-btn {
      background: none;
      border: none;
      color: var(--mid);
      font-family: var(--font-heading);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 4px 6px;
      transition: color .2s;
    }
    .lang-btn.active { color: var(--dark); }
    .lang-btn:hover  { color: var(--primary); }
    .lang-sep { color: var(--line); font-size: 14px; }

    /* ── HERO ── */
    #hero {
      padding-top: calc(36px + 64px);
      background: var(--dark);
    }

    .hero-inner {
      padding: 80px 10vw 72px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 40px;
    }

    .hero-tag {
      display: inline-block;
      background: var(--primary);
      color: #fff;
      font-family: var(--font-heading);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      padding: 6px 14px;
      margin-bottom: 24px;
    }

    .hero-title {
      font-family: var(--font-heading);
      font-size: clamp(44px, 6vw, 80px);
      font-weight: 700;
      line-height: .95;
      color: #fff;
      letter-spacing: -.02em;
      text-transform: uppercase;
      margin-bottom: 24px;
    }
    .hero-title span { color: var(--primary); }

    .hero-sub {
      font-size: 15px;
      color: rgba(255,255,255,.45);
      max-width: 440px;
      font-weight: 300;
    }

    .hero-stat {
      text-align: right;
      flex-shrink: 0;
    }

    .hero-stat-num {
      font-family: var(--font-heading);
      font-size: clamp(48px, 6vw, 72px);
      font-weight: 700;
      color: var(--primary);
      line-height: 1;
    }

    .hero-stat-label {
      font-size: 11px;
      font-family: var(--font-heading);
      font-weight: 500;
      color: rgba(255,255,255,.35);
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    @media (max-width: 640px) {
      .hero-inner { flex-direction: column; align-items: flex-start; }
      .hero-stat { text-align: left; }
    }

    /* ── CAT NAV ── */
    #cat-nav {
      background: var(--dark);
      border-top: 1px solid rgba(255,255,255,.06);
      position: sticky;
      top: calc(36px + 64px);
      z-index: 90;
      display: flex;
      align-items: stretch;
      overflow-x: auto;
      scrollbar-width: none;
      padding: 0 10vw;
    }
    #cat-nav::-webkit-scrollbar { display: none; }

    .cat-nav-link {
      flex-shrink: 0;
      padding: 16px 22px;
      color: rgba(255,255,255,.35);
      text-decoration: none;
      font-size: 11px;
      font-family: var(--font-heading);
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      transition: color .2s;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
    }
    .cat-nav-link:hover { color: rgba(255,255,255,.7); }
    .cat-nav-link.active {
      color: #fff;
      border-bottom-color: var(--primary);
    }

    /* ── MAIN ── */
    #menu-content {
      padding: 0 10vw 100px;
    }

    /* ── CATEGORY ── */
    .menu-category {
      padding-top: 80px;
    }

    .cat-header {
      margin-bottom: 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding-bottom: 20px;
      border-bottom: 3px solid var(--dark);
    }

    .cat-title {
      font-family: var(--font-heading);
      font-size: clamp(22px, 2.8vw, 34px);
      font-weight: 700;
      color: var(--dark);
      text-transform: uppercase;
      letter-spacing: -.01em;
    }

    .cat-count {
      font-family: var(--font-heading);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .12em;
      color: var(--dim);
      text-transform: uppercase;
      flex-shrink: 0;
    }

    /* ── PRODUCT GRID ── */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 2px;
    }

    .product-card {
      background: #fff;
      border: 1px solid var(--line);
      transition: border-color .2s, transform .2s, box-shadow .2s;
      cursor: default;
      overflow: hidden;
    }
    .product-card:hover {
      border-color: var(--dark);
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(0,0,0,.08);
    }

    .product-img-wrap {
      aspect-ratio: 4/3;
      overflow: hidden;
      background: #f0f0f0;
      position: relative;
    }

    .product-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .5s ease;
    }
    .product-card:hover .product-img-wrap img { transform: scale(1.04); }

    .product-img-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--dim);
      font-size: 32px;
      font-family: var(--font-heading);
    }

    .product-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      background: var(--primary);
      color: #fff;
      font-family: var(--font-heading);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      padding: 4px 10px;
    }

    .product-body {
      padding: 20px 20px 24px;
    }

    .product-name {
      font-family: var(--font-heading);
      font-size: 15px;
      font-weight: 600;
      color: var(--dark);
      margin-bottom: 6px;
      letter-spacing: -.01em;
    }

    .product-desc {
      font-size: 13px;
      color: var(--mid);
      line-height: 1.6;
      margin-bottom: 14px;
      font-weight: 300;
    }

    .product-price {
      font-family: var(--font-heading);
      font-size: 17px;
      font-weight: 700;
      color: var(--dark);
    }

    /* ── CATEGORY SHOWCASE ── */
    #cat-showcase {
      padding: 80px 10vw;
      background: var(--dark);
    }

    .showcase-label {
      font-family: var(--font-heading);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--primary);
      margin-bottom: 16px;
    }

    .showcase-title {
      font-family: var(--font-heading);
      font-size: clamp(32px, 4vw, 52px);
      font-weight: 700;
      color: #fff;
      letter-spacing: -.02em;
      text-transform: uppercase;
      margin-bottom: 48px;
      line-height: 1;
    }
    .showcase-title span { color: var(--primary); }

    .showcase-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 2px;
    }

    .showcase-card {
      position: relative;
      aspect-ratio: 3/4;
      overflow: hidden;
      background: #1a1a1a;
    }

    .showcase-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: .7;
      transition: opacity .4s, transform .5s;
    }
    .showcase-card:hover img { opacity: .85; transform: scale(1.04); }

    .showcase-card-body {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 28px 24px;
      background: linear-gradient(to top, rgba(10,10,10,.9), transparent);
    }

    .showcase-card-name {
      font-family: var(--font-heading);
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -.01em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .showcase-card-cta {
      font-family: var(--font-heading);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--primary);
    }

    .showcase-placeholder {
      width: 100%;
      height: 100%;
      background: rgba(255,255,255,.04);
      display: flex;
      align-items: flex-end;
    }

    /* ── INFO STRIP ── */
    #info-strip {
      padding: 56px 10vw;
      background: var(--bg);
      border-top: 1px solid var(--line);
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 40px;
    }

    .info-col-label {
      font-family: var(--font-heading);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 12px;
    }

    .info-col-body {
      font-size: 14px;
      color: var(--mid);
      line-height: 1.8;
    }
    .info-col-body a {
      color: var(--dark);
      text-decoration: none;
      font-weight: 500;
    }
    .info-col-body a:hover { color: var(--primary); }

    /* ── FOOTER ── */
    #menu-footer {
      padding: 32px 10vw;
      background: var(--dark);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .footer-name {
      font-family: var(--font-heading);
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: -.01em;
    }

    .footer-copy {
      font-size: 12px;
      color: rgba(255,255,255,.25);
      margin-top: 2px;
    }

    .footer-links {
      display: flex;
      gap: 20px;
    }
    .footer-links a {
      color: rgba(255,255,255,.3);
      text-decoration: none;
      font-size: 12px;
      transition: color .2s;
    }
    .footer-links a:hover { color: rgba(255,255,255,.6); }

    /* ── REVEAL ── */
    .reveal {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity .6s ease, transform .6s ease;
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      #main-nav { padding: 0 20px; }
      .hero-inner { padding: 56px 6vw 56px; }
      #cat-nav { padding: 0 6vw; }
      #menu-content { padding: 0 6vw 80px; }
      #cat-showcase { padding: 64px 6vw; }
      #info-strip { padding: 48px 6vw; }
      #menu-footer { padding: 28px 6vw; }
      .product-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
    }
    @media (max-width: 480px) {
      .product-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

  <!-- ANNOUNCEMENT BAR -->
  <div id="ann-bar"></div>

  <!-- NAV -->
  <nav id="main-nav">
    <a href="../" class="nav-logo" id="nav-logo">Boutique</a>
    <div class="nav-right">
      <div class="lang-bar">
        <button class="lang-btn" data-lang="de" onclick="setLang('de')">DE</button>
        <span class="lang-sep">/</span>
        <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
      </div>
      <a href="../" class="nav-back" id="nav-back">
        <span>←</span>
        <span id="nav-back-text">Zurück</span>
      </a>
    </div>
  </nav>

  <!-- HERO -->
  <header id="hero">
    <div class="hero-inner">
      <div class="hero-text">
        <div class="hero-tag" id="hero-tag">Sortiment</div>
        <h1 class="hero-title" id="hero-title">UNSER<br><span>SORTIMENT</span></h1>
        <p class="hero-sub" id="hero-sub"></p>
      </div>
      <div class="hero-stat" id="hero-stat">
        <div class="hero-stat-num" id="hero-stat-num"></div>
        <div class="hero-stat-label" id="hero-stat-label">Produkte</div>
      </div>
    </div>
  </header>

  <!-- CAT NAV -->
  <nav id="cat-nav" aria-label="Kategorien"></nav>

  <!-- PRODUCT CONTENT -->
  <main id="menu-content"></main>

  <!-- CATEGORY SHOWCASE -->
  <section id="cat-showcase">
    <p class="showcase-label" id="showcase-label"></p>
    <h2 class="showcase-title" id="showcase-title">UNSERE<br><span>KATEGORIEN</span></h2>
    <div class="showcase-grid" id="showcase-grid"></div>
  </section>

  <!-- INFO STRIP -->
  <section id="info-strip">
    <div>
      <div class="info-col-label" id="info-hours-label">Öffnungszeiten</div>
      <div class="info-col-body" id="info-hours"></div>
    </div>
    <div>
      <div class="info-col-label" id="info-contact-label">Kontakt</div>
      <div class="info-col-body" id="info-contact"></div>
    </div>
    <div>
      <div class="info-col-label" id="info-addr-label">Adresse</div>
      <div class="info-col-body" id="info-addr"></div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer id="menu-footer">
    <div>
      <div class="footer-name" id="footer-name"></div>
      <div class="footer-copy" id="footer-copy"></div>
    </div>
    <div class="footer-links">
      <a href="/impressum.html">Impressum</a>
      <a href="/datenschutz.html">Datenschutz</a>
    </div>
  </footer>

  <script src="../data.js"></script>
  <script src="menu-data.js"></script>
  <script>
  (function () {
    'use strict';

    const D  = window.SITE_DATA;
    const MD = window.MENU_DATA;
    let lang = localStorage.getItem('lang') || 'de';

    function t(obj) {
      if (!obj) return '';
      if (typeof obj === 'string') return obj;
      return obj[lang] || obj.de || '';
    }
    function setText(id, val) { const el = document.getElementById(id); if (el) el.textContent = val; }
    function setHTML(id, val) { const el = document.getElementById(id); if (el) el.innerHTML = val; }

    function setLang(l) {
      lang = l;
      localStorage.setItem('lang', l);
      document.documentElement.lang = l;
      document.querySelectorAll('.lang-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.lang === l)
      );
      renderAll();
    }
    window.setLang = setLang;

    function applyCSSVars() {
      const r = document.documentElement;
      const c = D.colors;
      r.style.setProperty('--primary', c.primary);
      r.style.setProperty('--accent',  c.accent);
      r.style.setProperty('--bg',      c.bg);
      r.style.setProperty('--dark',    c.dark);
      r.style.setProperty('--mid',     c.mid);
      r.style.setProperty('--dim',     c.dim);
      r.style.setProperty('--line',    c.line);
      r.style.setProperty('--font-heading', `'${D.fonts.heading}', system-ui, sans-serif`);
      r.style.setProperty('--font-body',    `'${D.fonts.body}', system-ui, sans-serif`);
    }

    function renderNav() {
      setText('nav-logo', D.name);
      setText('nav-back-text', lang === 'en' ? 'Back' : 'Zurück');
    }

    function getCategories() {
      if (MD && MD.categories && MD.categories.length) return MD.categories;
      if (D.services && D.services.length) {
        return [{ name: { de: 'Alle Produkte', en: 'All Products' }, items: D.services }];
      }
      return [];
    }

    function renderHero() {
      document.title = (lang === 'en' ? 'Collection' : 'Sortiment') + ' — ' + D.name;
      if (D.announcementBar) setText('ann-bar', t(D.announcementBar));

      setText('hero-tag', lang === 'en' ? 'Collection' : 'Sortiment');
      setHTML('hero-title', lang === 'en'
        ? 'OUR<br><span>COLLECTION</span>'
        : 'UNSER<br><span>SORTIMENT</span>'
      );
      setText('hero-sub', t(D.tagline));

      const cats  = getCategories();
      const total = cats.reduce((sum, c) => sum + (c.items ? c.items.length : 0), 0);
      if (total > 0) {
        setText('hero-stat-num', total + '+');
        setText('hero-stat-label', lang === 'en' ? 'Products' : 'Produkte');
      } else {
        const stat = document.getElementById('hero-stat');
        if (stat) stat.style.display = 'none';
      }
    }

    function renderCatNav() {
      const nav  = document.getElementById('cat-nav');
      const cats = getCategories();
      if (!nav || !cats.length) return;
      nav.innerHTML = cats.map((cat, i) =>
        `<a class="cat-nav-link${i === 0 ? ' active' : ''}" href="#cat-${i}" data-idx="${i}">${t(cat.name)}</a>`
      ).join('');
    }

    function renderProducts() {
      const content = document.getElementById('menu-content');
      const cats    = getCategories();
      if (!content || !cats.length) return;

      content.innerHTML = cats.map((cat, i) => {
        const cards = (cat.items || []).map(item => {
          const imgSrc = item.img
            ? (item.img.startsWith('http') ? item.img : '../' + item.img)
            : '';
          const imgHtml = imgSrc
            ? `<img src="${imgSrc}" alt="${t(item.name)}" loading="lazy">`
            : `<div class="product-img-placeholder">◈</div>`;

          const badgeHtml = item.badge
            ? `<div class="product-badge">${t(item.badge)}</div>`
            : '';

          return `
            <div class="product-card reveal">
              <div class="product-img-wrap">
                ${imgHtml}
                ${badgeHtml}
              </div>
              <div class="product-body">
                <div class="product-name">${t(item.name)}</div>
                <div class="product-desc">${t(item.desc)}</div>
                <div class="product-price">${item.price || ''}</div>
              </div>
            </div>`;
        }).join('');

        return `
          <section class="menu-category" id="cat-${i}">
            <div class="cat-header reveal">
              <h2 class="cat-title">${t(cat.name)}</h2>
              <span class="cat-count">${(cat.items || []).length} ${lang === 'en' ? 'Items' : 'Artikel'}</span>
            </div>
            <div class="product-grid">${cards}</div>
          </section>`;
      }).join('');
    }

    function renderShowcase() {
      setText('showcase-label', lang === 'en' ? 'Browse' : 'Entdecken');
      setHTML('showcase-title', lang === 'en'
        ? 'OUR<br><span>CATEGORIES</span>'
        : 'UNSERE<br><span>KATEGORIEN</span>'
      );

      const grid = document.getElementById('showcase-grid');
      const cats = D.categories;
      if (!grid || !cats || !cats.length) {
        const section = document.getElementById('cat-showcase');
        if (section) section.style.display = 'none';
        return;
      }

      grid.innerHTML = cats.map(cat => {
        const imgSrc = cat.img ? '../' + cat.img : '';
        const imgHtml = imgSrc
          ? `<img src="${imgSrc}" alt="${t(cat.name)}" loading="lazy">`
          : `<div class="showcase-placeholder"></div>`;
        return `
          <div class="showcase-card reveal">
            ${imgHtml}
            <div class="showcase-card-body">
              <div class="showcase-card-name">${t(cat.name)}</div>
              ${cat.cta ? `<div class="showcase-card-cta">${t(cat.cta)} →</div>` : ''}
            </div>
          </div>`;
      }).join('');
    }

    function renderInfo() {
      setText('info-hours-label', lang === 'en' ? 'Opening Hours' : 'Öffnungszeiten');
      setText('info-contact-label', lang === 'en' ? 'Contact' : 'Kontakt');
      setText('info-addr-label', lang === 'en' ? 'Address' : 'Adresse');

      if (D.hours) {
        setHTML('info-hours', D.hours.map(h =>
          `<div>${t(h.day)}: ${h.closed ? (lang === 'en' ? 'Closed' : 'Geschlossen') : h.time}</div>`
        ).join(''));
      }

      setHTML('info-contact', `
        <div><a href="tel:${D.phone}">${D.phone}</a></div>
        <div><a href="mailto:${D.email}">${D.email}</a></div>
      `);

      setText('info-addr', D.address);
    }

    function renderFooter() {
      setText('footer-name', D.name);
      setText('footer-copy', '© ' + new Date().getFullYear() + ' ' + D.name);
    }

    function initScrollSpy() {
      const sections = document.querySelectorAll('.menu-category');
      const links    = document.querySelectorAll('.cat-nav-link');

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const idx = entry.target.id.replace('cat-', '');
            links.forEach(l => l.classList.toggle('active', l.dataset.idx === idx));
          }
        });
      }, { rootMargin: '-25% 0px -65% 0px' });

      sections.forEach(s => observer.observe(s));
    }

    function initReveal() {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
      }, { threshold: 0.06 });
      document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    }

    function renderAll() {
      renderNav();
      renderHero();
      renderCatNav();
      renderProducts();
      renderShowcase();
      renderInfo();
      renderFooter();
      setTimeout(() => { initReveal(); initScrollSpy(); }, 50);
    }

    function init() {
      applyCSSVars();
      document.querySelectorAll('.lang-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.lang === lang)
      );
      document.documentElement.lang = lang;
      renderAll();
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  })();
  </script>
</body>
</html>
