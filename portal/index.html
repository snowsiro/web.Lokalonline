<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kundenportal — lokalonline.at</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../admin/admin.css" />
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">lokalonline<span>.at</span></div>
      <div class="login-subtitle">Kundenportal</div>

      <!-- Step 1: Email input -->
      <div id="stepEmail">
        <form id="loginForm">
          <div class="form-group">
            <label for="email">Ihre E-Mail-Adresse</label>
            <input type="email" id="email" placeholder="ihre@email.at" required autocomplete="email" />
          </div>
          <button type="submit" class="btn btn-primary btn-full" id="loginBtn">Login-Link senden</button>
          <div class="error-msg" id="errorMsg"></div>
        </form>
        <p style="margin-top:20px;text-align:center;font-size:12px;color:var(--text-muted)">
          Noch kein Zugang? <a href="/#contact" style="color:var(--primary)">Kontakt aufnehmen</a>
        </p>
      </div>

      <!-- Step 2: Check email notice -->
      <div id="stepSent" style="display:none;text-align:center">
        <div style="font-size:48px;margin-bottom:16px">📬</div>
        <h3 style="margin:0 0 8px;font-size:18px">E-Mail gesendet!</h3>
        <p style="color:var(--text-muted);font-size:14px;line-height:1.6">
          Wir haben einen Login-Link an<br>
          <strong id="sentEmail"></strong><br>
          gesendet. Bitte überprüfen Sie Ihr Postfach.
        </p>
        <p style="margin-top:16px;font-size:12px;color:var(--text-muted)">
          Kein E-Mail erhalten? <button id="resendBtn" style="background:none;border:none;color:var(--primary);cursor:pointer;font-size:12px;padding:0;text-decoration:underline">Erneut senden</button>
        </p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    var sb = supabase.createClient(
      'https://vhnourjddnlslgabrasb.supabase.co',
      'sb_publishable_y5l1cAZXoAj8xaSVXUkBfw_Pk9pxb6H'
    );

    // Already logged in → go to dashboard
    sb.auth.getSession().then(function (ref) {
      if (ref.data.session) location.href = 'dashboard.html';
    });

    function sendMagicLink(email) {
      return sb.auth.signInWithOtp({
        email: email,
        options: { emailRedirectTo: 'https://lokalonline.at/portal/dashboard.html' }
      });
    }

    document.getElementById('loginForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      var btn = document.getElementById('loginBtn');
      var errEl = document.getElementById('errorMsg');
      var email = document.getElementById('email').value.trim();
      btn.textContent = '…'; btn.disabled = true;
      errEl.classList.remove('show');

      var { error } = await sendMagicLink(email);

      if (error) {
        errEl.textContent = 'Fehler beim Senden. Bitte versuchen Sie es erneut.';
        errEl.classList.add('show');
        btn.textContent = 'Login-Link senden'; btn.disabled = false;
      } else {
        document.getElementById('sentEmail').textContent = email;
        document.getElementById('stepEmail').style.display = 'none';
        document.getElementById('stepSent').style.display = 'block';
      }
    });

    document.getElementById('resendBtn').addEventListener('click', async function () {
      var email = document.getElementById('email').value.trim();
      this.textContent = '…';
      await sendMagicLink(email);
      this.textContent = 'Gesendet ✓';
      setTimeout(function () {
        document.getElementById('resendBtn').textContent = 'Erneut senden';
      }, 3000);
    });
  </script>
</body>
</html>
