<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="seo-title">Beauty Studio</title>
<meta name="description" id="seo-desc" content="">
<meta property="og:image" id="seo-og" content="">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --primary: #C9A96E;
  --accent:  #C9A96E;
  --bg:      #FAF9F7;
  --dark:    #1A1A1A;
  --mid:     #8A8480;
  --dim:     #6B6865;
  --line:    #E8E4DF;
  --white:   #FFFFFF;
  --font-heading: 'Cormorant Garamond', serif;
  --font-body:    'DM Sans', sans-serif;
}
html { scroll-behavior: smooth; }
body { font-family: var(--font-body); background: var(--bg); color: var(--dark); overflow-x: hidden; }

/* ── TOP BAR ── */
.top-bar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 400;
  height: 36px; background: var(--dark);
  display: flex; align-items: center; justify-content: flex-end;
  padding: 0 48px; gap: 20px;
}
.top-bar a {
  color: rgba(255,255,255,0.6); text-decoration: none;
  font-size: 11px; letter-spacing: 0.06em;
  display: flex; align-items: center; gap: 6px;
  transition: color 0.2s;
}
.top-bar a:hover { color: var(--primary); }
.top-bar svg { width: 13px; height: 13px; fill: currentColor; }
.top-bar .divider { width: 1px; height: 14px; background: rgba(255,255,255,0.15); }
.lang-toggle {
  display: flex; gap: 0; margin-left: 8px;
}
.lang-btn {
  background: none; border: none; cursor: pointer;
  font-family: var(--font-body); font-size: 10px; font-weight: 400;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: rgba(255,255,255,0.32); padding: 4px 8px;
  transition: color 0.2s;
}
.lang-btn.active { color: rgba(255,255,255,0.88); }

/* ── NAV ── */
nav {
  position: fixed; top: 36px; left: 0; right: 0; z-index: 300;
  height: 68px; display: flex; align-items: center; justify-content: space-between;
  padding: 0 48px;
  background: rgba(250,249,247,0.97);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid transparent;
  transition: border-color 0.4s, box-shadow 0.4s;
}
nav.scrolled { border-color: var(--line); box-shadow: 0 2px 24px rgba(0,0,0,0.04); }
.nav-logo {
  font-family: var(--font-heading); font-size: 24px; font-weight: 400;
  letter-spacing: 0.06em; color: var(--dark); text-decoration: none;
  white-space: nowrap;
}
.nav-links { display: flex; gap: 0; list-style: none; align-items: center; }
.nav-links a {
  font-size: 10px; font-weight: 400; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--dim); text-decoration: none; padding: 8px 14px;
  transition: color 0.2s; white-space: nowrap;
}
.nav-links a:hover { color: var(--dark); }
.nav-cta {
  font-size: 10px; font-weight: 400; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--primary); text-decoration: none; padding: 8px 14px;
  border: 1px solid var(--primary); transition: all 0.25s;
  white-space: nowrap;
}
.nav-cta:hover { background: var(--primary); color: #fff; }
.nav-left { display: flex; align-items: center; }
.nav-right { display: flex; align-items: center; }
.nav-center { display: flex; align-items: center; position: absolute; left: 50%; transform: translateX(-50%); }
.hamburger { display: none; background: none; border: none; cursor: pointer; padding: 8px; flex-direction: column; gap: 5px; }
.hamburger span { display: block; width: 22px; height: 1px; background: var(--dark); transition: all 0.3s; }
.mobile-menu { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 500; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
.mobile-menu.open { display: flex; }
.mobile-menu a { font-family: var(--font-heading); font-size: 32px; font-weight: 300; color: var(--dark); text-decoration: none; letter-spacing: 0.04em; padding: 10px; transition: color 0.2s; }
.mobile-menu a:hover { color: var(--primary); }
.mobile-menu-close { position: absolute; top: 36px+68px; right: 24px; background: none; border: none; font-size: 28px; cursor: pointer; color: var(--dark); top: 110px; }

/* ── HERO SPLIT ── */
#hero {
  min-height: 100vh;
  display: grid; grid-template-columns: 60fr 40fr;
  padding-top: 104px;
}
.hero-image-wrap {
  position: relative; overflow: hidden; min-height: 90vh;
}
.hero-img {
  position: absolute; inset: 0;
  background: url('img/slide1.jpg') center/cover no-repeat;
  transition: transform 8s ease; transform: scale(1.04);
}
.hero-img.loaded { transform: scale(1); }
.hero-content {
  display: flex; flex-direction: column; justify-content: center;
  padding: 80px 64px 80px 72px;
  background: var(--white);
}
.hero-eyebrow {
  font-size: 10px; font-weight: 400; letter-spacing: 0.3em; text-transform: uppercase;
  color: var(--primary); margin-bottom: 20px; display: block;
}
.hero-title {
  font-family: var(--font-heading); font-size: clamp(48px, 5vw, 72px); font-weight: 300;
  line-height: 1.08; color: var(--dark); margin-bottom: 24px;
}
.hero-title em { font-style: italic; color: var(--primary); }
.hero-desc { font-size: 15px; font-weight: 300; line-height: 1.7; color: var(--dim); margin-bottom: 40px; max-width: 340px; }
.hero-actions { display: flex; align-items: center; gap: 24px; flex-wrap: wrap; }
.btn-primary {
  display: inline-block; padding: 14px 32px;
  background: var(--primary); color: #fff;
  font-size: 10px; font-weight: 400; letter-spacing: 0.2em; text-transform: uppercase;
  text-decoration: none; border: none; cursor: pointer;
  transition: background 0.25s, transform 0.2s;
}
.btn-primary:hover { background: var(--dark); }
.btn-secondary {
  font-size: 10px; font-weight: 400; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--dim); text-decoration: none; border-bottom: 1px solid var(--line);
  padding-bottom: 2px; transition: color 0.2s, border-color 0.2s;
}
.btn-secondary:hover { color: var(--dark); border-color: var(--dark); }

/* ── SECTION BASICS ── */
section { padding: 100px 0; }
.container { max-width: 1120px; margin: 0 auto; padding: 0 48px; }
.section-label {
  font-size: 10px; font-weight: 400; letter-spacing: 0.3em; text-transform: uppercase;
  color: var(--primary); margin-bottom: 16px; display: block;
}
.section-title {
  font-family: var(--font-heading); font-size: clamp(36px, 4vw, 56px); font-weight: 300;
  line-height: 1.1; color: var(--dark);
}
.section-title em { font-style: italic; }
.section-intro { font-size: 15px; font-weight: 300; line-height: 1.8; color: var(--dim); max-width: 540px; margin-top: 16px; }
.section-header { margin-bottom: 64px; }
.divider-line { width: 48px; height: 1px; background: var(--primary); margin: 24px 0; }

/* ── SERVICES ── */
#services { background: var(--white); }
.services-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px;
  background: var(--line);
}
.service-card {
  background: var(--white); padding: 40px 36px;
  transition: background 0.25s;
  cursor: default;
}
.service-card:hover { background: var(--bg); }
.service-img {
  width: 100%; height: 200px; object-fit: cover;
  margin-bottom: 24px; filter: grayscale(20%);
  transition: filter 0.4s;
}
.service-card:hover .service-img { filter: grayscale(0); }
.service-name {
  font-family: var(--font-heading); font-size: 24px; font-weight: 400;
  color: var(--dark); margin-bottom: 10px; letter-spacing: 0.02em;
}
.service-desc { font-size: 13px; font-weight: 300; line-height: 1.7; color: var(--dim); margin-bottom: 20px; }
.service-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 16px; border-top: 1px solid var(--line); }
.service-price { font-family: var(--font-heading); font-size: 20px; font-weight: 400; color: var(--primary); }
.service-cta {
  font-size: 9px; font-weight: 400; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--dim); text-decoration: none; transition: color 0.2s;
}
.service-cta:hover { color: var(--primary); }

/* ── GALLERY MASONRY ── */
#gallery { background: var(--bg); }
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: auto;
  gap: 8px;
}
.gallery-item {
  overflow: hidden; position: relative;
  background: var(--line);
}
.gallery-item img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform 0.6s ease;
  display: block;
}
.gallery-item:hover img { transform: scale(1.04); }
.gallery-item:nth-child(1) { grid-row: span 2; height: 500px; }
.gallery-item:nth-child(2) { height: 240px; }
.gallery-item:nth-child(3) { height: 240px; }
.gallery-item:nth-child(4) { height: 240px; }
.gallery-item:nth-child(5) { height: 240px; }

/* ── TEAM ── */
#team { background: var(--white); }
.team-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 48px; }
.team-card { text-align: center; }
.team-photo-wrap {
  width: 180px; height: 220px; margin: 0 auto 24px;
  overflow: hidden; position: relative;
}
.team-photo {
  width: 100%; height: 100%; object-fit: cover;
  filter: grayscale(20%); transition: filter 0.4s;
}
.team-card:hover .team-photo { filter: grayscale(0); }
.team-name {
  font-family: var(--font-heading); font-size: 22px; font-weight: 400;
  color: var(--dark); margin-bottom: 4px; letter-spacing: 0.02em;
}
.team-title { font-size: 11px; font-weight: 400; letter-spacing: 0.18em; text-transform: uppercase; color: var(--primary); margin-bottom: 12px; }
.team-bio { font-size: 13px; font-weight: 300; line-height: 1.7; color: var(--dim); }

/* ── PRICE LIST ── */
#prices { background: var(--bg); }
.price-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 48px; }
.price-category-title {
  font-family: var(--font-heading); font-size: 26px; font-weight: 400; font-style: italic;
  color: var(--dark); margin-bottom: 24px; padding-bottom: 16px;
  border-bottom: 1px solid var(--line);
}
.price-item {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 10px 0; border-bottom: 1px solid var(--line);
  gap: 16px;
}
.price-item-name { font-size: 13px; font-weight: 300; color: var(--dim); }
.price-item-price { font-size: 13px; font-weight: 400; color: var(--dark); white-space: nowrap; }

/* ── HOURS + LOCATION ── */
#info { background: var(--white); }
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: start; }
.hours-list { list-style: none; }
.hours-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 0; border-bottom: 1px solid var(--line);
  font-size: 14px;
}
.hours-day { color: var(--dim); font-weight: 300; }
.hours-time { color: var(--dark); font-weight: 400; }
.hours-closed { color: var(--mid); font-style: italic; font-weight: 300; }
.location-address { font-size: 15px; font-weight: 300; line-height: 1.8; color: var(--dim); margin-bottom: 16px; }
.location-link {
  font-size: 10px; font-weight: 400; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--primary); text-decoration: none; border-bottom: 1px solid var(--primary);
  padding-bottom: 2px; transition: opacity 0.2s;
}
.location-link:hover { opacity: 0.7; }

/* ── MAP ── */
#map { padding: 0; line-height: 0; }
#map iframe { width: 100%; height: 420px; border: 0; filter: grayscale(20%) contrast(1.05); }

/* ── BOOKING FORM ── */
#booking { background: var(--bg); }
.booking-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: start; }
.booking-info { padding-top: 8px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-grid .full { grid-column: 1 / -1; }
.form-group { display: flex; flex-direction: column; gap: 8px; }
.form-group label { font-size: 10px; font-weight: 400; letter-spacing: 0.2em; text-transform: uppercase; color: var(--dim); }
.form-group input,
.form-group select,
.form-group textarea {
  font-family: var(--font-body); font-size: 14px; font-weight: 300;
  color: var(--dark); background: var(--white);
  border: 1px solid var(--line); padding: 12px 16px;
  outline: none; transition: border-color 0.2s;
  appearance: none; -webkit-appearance: none;
  border-radius: 0;
}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus { border-color: var(--primary); }
.form-group textarea { resize: vertical; min-height: 100px; }
.form-submit {
  display: inline-block; margin-top: 8px; padding: 14px 40px;
  background: var(--primary); color: #fff;
  font-family: var(--font-body); font-size: 10px; font-weight: 400;
  letter-spacing: 0.2em; text-transform: uppercase;
  border: none; cursor: pointer; transition: background 0.25s;
}
.form-submit:hover { background: var(--dark); }
.form-msg { margin-top: 12px; font-size: 13px; font-weight: 300; min-height: 20px; }
.form-msg.ok { color: var(--primary); }
.form-msg.err { color: #c0392b; }

/* ── REVIEWS ── */
#reviews { background: var(--white); }
.reviews-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px; }
.review-card { padding: 32px; background: var(--bg); }
.review-stars { color: var(--primary); font-size: 13px; letter-spacing: 2px; margin-bottom: 16px; }
.review-text { font-size: 14px; font-weight: 300; line-height: 1.75; color: var(--dim); font-style: italic; margin-bottom: 20px; }
.review-author { font-size: 11px; font-weight: 400; letter-spacing: 0.12em; text-transform: uppercase; color: var(--mid); }
.reviews-empty { font-size: 14px; color: var(--mid); font-style: italic; }

/* ── FOOTER ── */
footer {
  background: var(--dark); color: rgba(255,255,255,0.5);
  padding: 64px 0 32px;
}
.footer-inner { display: grid; grid-template-columns: 1.5fr 1fr 1fr; gap: 48px; margin-bottom: 48px; }
.footer-brand-name {
  font-family: var(--font-heading); font-size: 26px; font-weight: 300;
  color: rgba(255,255,255,0.88); letter-spacing: 0.06em; margin-bottom: 12px;
}
.footer-tagline { font-size: 12px; font-weight: 300; line-height: 1.7; color: rgba(255,255,255,0.38); margin-bottom: 20px; }
.footer-social { display: flex; gap: 12px; }
.footer-social a {
  width: 36px; height: 36px; border: 1px solid rgba(255,255,255,0.12);
  display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,0.4); text-decoration: none; font-size: 12px;
  transition: all 0.2s;
}
.footer-social a:hover { border-color: var(--primary); color: var(--primary); }
.footer-col-title {
  font-size: 10px; font-weight: 400; letter-spacing: 0.22em; text-transform: uppercase;
  color: rgba(255,255,255,0.5); margin-bottom: 20px;
}
.footer-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
.footer-list a {
  font-size: 13px; font-weight: 300; color: rgba(255,255,255,0.38);
  text-decoration: none; transition: color 0.2s;
}
.footer-list a:hover { color: var(--primary); }
.footer-bottom {
  padding-top: 32px; border-top: 1px solid rgba(255,255,255,0.06);
  display: flex; justify-content: space-between; align-items: center;
}
.footer-copy { font-size: 11px; font-weight: 300; color: rgba(255,255,255,0.22); }
.footer-copy a { color: rgba(255,255,255,0.35); text-decoration: none; }
.footer-copy a:hover { color: var(--primary); }

/* ── RESPONSIVE ── */
@media (max-width: 1024px) {
  .services-grid { grid-template-columns: repeat(2, 1fr); }
  .price-grid { grid-template-columns: 1fr 1fr; }
  .footer-inner { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 768px) {
  .top-bar { padding: 0 20px; }
  nav { padding: 0 20px; }
  .container { padding: 0 20px; }
  .nav-left, .nav-right { display: none; }
  .hamburger { display: flex; }
  #hero { grid-template-columns: 1fr; }
  .hero-image-wrap { min-height: 50vw; }
  .hero-content { padding: 48px 24px; }
  .hero-title { font-size: 42px; }
  section { padding: 64px 0; }
  .services-grid { grid-template-columns: 1fr; }
  .gallery-grid { grid-template-columns: 1fr 1fr; }
  .gallery-item:nth-child(1) { grid-row: span 1; height: 240px; }
  .team-grid { grid-template-columns: 1fr; gap: 32px; }
  .price-grid { grid-template-columns: 1fr; gap: 32px; }
  .info-grid { grid-template-columns: 1fr; gap: 48px; }
  .booking-inner { grid-template-columns: 1fr; }
  .form-grid { grid-template-columns: 1fr; }
  .form-grid .full { grid-column: 1; }
  .reviews-grid { grid-template-columns: 1fr; }
  .footer-inner { grid-template-columns: 1fr; gap: 32px; }
  .footer-bottom { flex-direction: column; gap: 12px; text-align: center; }
  .nav-center { position: static; transform: none; }
}
</style>
</head>

<!-- NAV -->
<nav id="main-nav">
  <div class="nav-left">
    <ul class="nav-links" id="nav-left-links"></ul>
  </div>
  <div class="nav-center">
    <a href="#" class="nav-logo" id="nav-logo"></a>

    <ul class="nav-links" id="nav-right-links"></ul>
    <a href="#booking" class="nav-cta" id="nav-cta" style="margin-left:16px"></a>
  </div>

    <span></span><span></span><span></span>

<!-- MOBILE MENU -->
<div class="mobile-menu" id="mobile-menu">
  <button class="mobile-menu-close" onclick="toggleMenu()">×</button>
  <div id="mobile-links"></div>
</div>

<!-- HERO -->
<section id="hero">
  <div class="hero-image-wrap">
    <div class="hero-img" id="hero-img"></div>
  </div>
  <div class="hero-content">
    <span class="hero-eyebrow" id="hero-eyebrow"></span>
    <h1 class="hero-title" id="hero-title"></h1>
    <p class="hero-desc" id="hero-desc"></p>
    <div class="hero-actions">
      <a href="#booking" class="btn-primary" id="hero-cta1"></a>
      <a href="#services" class="btn-secondary" id="hero-cta2"></a>
    </div>
  </div>
</section>

<!-- SERVICES -->
<section id="services">
  <div class="container">
    <div class="section-header">
      <span class="section-label" id="lbl-services"></span>
      <h2 class="section-title" id="ttl-services"></h2>
      <div class="divider-line"></div>
    </div>
    <div class="services-grid" id="services-grid"></div>
  </div>
</section>

<!-- GALLERY -->
<section id="gallery">
  <div class="container">
    <div class="section-header" style="display:flex;justify-content:space-between;align-items:flex-end">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="data.js"></script>
<script>
// ─── GLOBALS ────────────────────────────────────────────────────
const D = window.SITE_DATA;
let lang = localStorage.getItem('lang') || 'de';
function t(obj) { if (!obj) return ''; return obj[lang] || obj.de || ''; }
function setLang(l) {
  lang = l; localStorage.setItem('lang', l);
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === l));
  render();
}

// Apply CSS variables from data
const root = document.documentElement;
if (D.colors) { Object.entries(D.colors).forEach(([k,v]) => root.style.setProperty('--'+k, v)); }
if (D.fonts) {
  if (D.fonts.heading) root.style.setProperty('--font-heading', `'${D.fonts.heading}', serif`);
  if (D.fonts.body)    root.style.setProperty('--font-body', `'${D.fonts.body}', sans-serif`);
}

// ─── SUPABASE ───────────────────────────────────────────────────
const sb = supabase.createClient(D.supabase.url, D.supabase.key);

// ─── NAV SCROLL ─────────────────────────────────────────────────
const mainNav = document.getElementById('main-nav');
window.addEventListener('scroll', () => mainNav.classList.toggle('scrolled', window.scrollY > 40));

// ─── MOBILE MENU ────────────────────────────────────────────────
function toggleMenu() {
  document.getElementById('mobile-menu').classList.toggle('open');
}

// ─── NAV LINKS CONFIG ───────────────────────────────────────────
const navLinks = [
  { de:'Leistungen', en:'Services',  href:'#services' },
  { de:'Galerie',    en:'Gallery',   href:'#gallery' },
  { de:'Team',       en:'Team',      href:'#team' },
  { de:'Preise',     en:'Prices',    href:'#prices' },
  { de:'Kontakt',    en:'Contact',   href:'#info' }
];

// ─── RENDER ─────────────────────────────────────────────────────
function render() {
  // SEO
  document.getElementById('seo-title').textContent = D.seo?.title || D.name;
  document.getElementById('seo-desc').content = t(D.seo?.description) || '';
  document.getElementById('seo-og').content = D.seo?.ogImage || '';
  document.title = D.seo?.title || D.name;

  // Top bar
  const phoneEl = document.getElementById('tb-phone');
  phoneEl.href = 'tel:' + D.phone; document.getElementById('tb-phone-txt').textContent = D.phone;
  const igEl = document.getElementById('tb-ig');
  const igHandle = D.instagram?.replace('@','');
  igEl.href = 'https://instagram.com/' + igHandle; document.getElementById('tb-ig-txt').textContent = D.instagram;

  // Nav
  document.getElementById('nav-logo').textContent = D.name;
  const leftLinks = navLinks.slice(0,2);
  const rightLinks = navLinks.slice(2);
  document.getElementById('nav-left-links').innerHTML = leftLinks.map(l =>
    `<li><a href="${l.href}">${t(l)}</a></li>`).join('');
  document.getElementById('nav-right-links').innerHTML = rightLinks.map(l =>
    `<li><a href="${l.href}">${t(l)}</a></li>`).join('');
  document.getElementById('nav-cta').textContent = lang === 'de' ? 'Termin buchen' : 'Book Now';
  document.getElementById('mobile-links').innerHTML = [...navLinks,
    {de:'Termin buchen', en:'Book Now', href:'#booking'}].map(l =>
    `<a href="${l.href}" onclick="toggleMenu()">${t(l)}</a>`).join('');

  // Hero
  const slide = D.slides?.[0] || {};
  document.getElementById('hero-img').style.backgroundImage = `url('${slide.img || D.photos?.[0] || ''}')`;
  setTimeout(() => document.getElementById('hero-img').classList.add('loaded'), 100);
  document.getElementById('hero-eyebrow').textContent = t(slide.eyebrow) || '';
  document.getElementById('hero-title').innerHTML = t(slide.title) || D.name;
  document.getElementById('hero-desc').textContent = t(slide.desc) || t(D.tagline);
  document.getElementById('hero-cta1').textContent = lang === 'de' ? 'Termin buchen' : 'Book Now';
  document.getElementById('hero-cta2').textContent = lang === 'de' ? 'Leistungen entdecken' : 'Discover Services';

  // Services
  document.getElementById('lbl-services').textContent = lang === 'de' ? 'Unsere Leistungen' : 'Our Services';
  document.getElementById('ttl-services').innerHTML = lang === 'de' ? 'Was wir für<br><em>Sie tun</em>' : 'What We Do<br><em>For You</em>';
  document.getElementById('services-grid').innerHTML = (D.services || []).map(s => `
    <div class="service-card">
      <img src="${s.img||''}" alt="${t(s.name)}" class="service-img" loading="lazy"
           onerror="this.style.display='none'">
      <div class="service-name">${t(s.name)}</div>
      <p class="service-desc">${t(s.desc)}</p>
      <div class="service-footer">
        <span class="service-price">${s.price||''}</span>
        <a href="#booking" class="service-cta">${lang==='de'?'Buchen':'Book'} →</a>
      </div>
    </div>`).join('');

  // Gallery
  document.getElementById('lbl-gallery').textContent = lang === 'de' ? 'Einblicke' : 'Gallery';
  document.getElementById('ttl-gallery').innerHTML = lang === 'de' ? 'Unser <em>Atelier</em>' : 'Our <em>Studio</em>';
  const photos = D.photos || [];
  document.getElementById('gallery-grid').innerHTML = photos.slice(0,5).map(p =>
    `<div class="gallery-item"><img src="${p}" alt="" loading="lazy"></div>`).join('');

  // Team
  document.getElementById('lbl-team').textContent = lang === 'de' ? 'Unser Team' : 'Our Team';
  document.getElementById('ttl-team').innerHTML = lang === 'de' ? 'Menschen hinter der <em>Schönheit</em>' : 'The People Behind <em>the Beauty</em>';
  const team = D.team || [];
  document.getElementById('team-grid').innerHTML = team.map(m => `
    <div class="team-card">
      <div class="team-photo-wrap">
        <img src="${m.img||'img/team1.jpg'}" alt="${m.name}" class="team-photo" loading="lazy"
             onerror="this.style.background='var(--line)'">
      </div>
      <div class="team-name">${m.name}</div>
      <div class="team-title">${t(m.title)}</div>
      <p class="team-bio">${t(m.bio)}</p>
    </div>`).join('');

  // Prices
  document.getElementById('lbl-prices').textContent = lang === 'de' ? 'Preisliste' : 'Price List';
  document.getElementById('ttl-prices').innerHTML = lang === 'de' ? 'Unsere <em>Preise</em>' : 'Our <em>Prices</em>';
  document.getElementById('price-grid').innerHTML = (D.priceList || []).map(cat => `
    <div>
      <div class="price-category-title">${t(cat.category)}</div>
      ${(cat.items||[]).map(item => `
        <div class="price-item">
          <span class="price-item-name">${t(item.name)}</span>
          <span class="price-item-price">${item.price}</span>
        </div>`).join('')}
    </div>`).join('');

  // Hours + Location
  document.getElementById('lbl-hours').textContent = lang === 'de' ? 'Öffnungszeiten' : 'Opening Hours';
  document.getElementById('ttl-hours').innerHTML = lang === 'de' ? 'Wann wir <em>für Sie da</em> sind' : 'When We Are <em>Here For You</em>';
  document.getElementById('hours-list').innerHTML = (D.hours||[]).map(h => `
    <li class="hours-row">
      <span class="hours-day">${t(h.day)}</span>
      ${h.closed
        ? `<span class="hours-closed">${lang==='de'?'Geschlossen':'Closed'}</span>`
        : `<span class="hours-time">${h.time}</span>`}
    </li>`).join('');
  document.getElementById('lbl-location').textContent = lang === 'de' ? 'Standort' : 'Location';
  document.getElementById('ttl-location').innerHTML = lang === 'de' ? 'So finden Sie <em>uns</em>' : 'How To <em>Find Us</em>';
  document.getElementById('location-address').textContent = D.address || '';
  document.getElementById('location-contact').innerHTML =
    `${D.phone || ''}<br>${D.email || ''}`;
  const mapsLink = document.getElementById('location-maps-link');
  mapsLink.href = D.googleMapsUrl || '#';
  mapsLink.textContent = lang === 'de' ? 'Auf Google Maps öffnen →' : 'Open in Google Maps →';

  // Map
  const mapIframe = document.getElementById('map-iframe');
  if (D.googleMapsEmbed) mapIframe.src = D.googleMapsEmbed;

  // Booking form
  document.getElementById('lbl-booking').textContent = lang === 'de' ? 'Terminbuchung' : 'Book Appointment';
  document.getElementById('ttl-booking').innerHTML = lang === 'de' ? 'Jetzt <em>Termin</em> buchen' : 'Book Your <em>Appointment</em>';
  document.getElementById('desc-booking').textContent = lang === 'de'
    ? 'Wählen Sie Ihren Wunschtermin. Wir melden uns zur Bestätigung.'
    : 'Choose your preferred date and time. We will confirm shortly.';
  document.getElementById('lbl-fname').textContent = lang === 'de' ? 'Ihr Name' : 'Your Name';
  document.getElementById('lbl-fphone').textContent = lang === 'de' ? 'Telefon' : 'Phone';
  document.getElementById('lbl-fdate').textContent = lang === 'de' ? 'Datum' : 'Date';
  document.getElementById('lbl-ftime').textContent = lang === 'de' ? 'Uhrzeit' : 'Time';
  document.getElementById('lbl-fservice').textContent = lang === 'de' ? 'Leistung' : 'Service';
  document.getElementById('lbl-fnotes').textContent = lang === 'de' ? 'Anmerkungen (optional)' : 'Notes (optional)';
  document.getElementById('btn-book').textContent = lang === 'de' ? 'Termin anfragen' : 'Request Appointment';
  const sel = document.getElementById('f-service');
  sel.innerHTML = `<option value="">${lang==='de'?'Leistung wählen':'Select service'}</option>` +
    (D.services||[]).map(s => `<option value="${t(s.name)}">${t(s.name)} — ${s.price||''}</option>`).join('');

  // Reviews labels
  document.getElementById('lbl-reviews').textContent = lang === 'de' ? 'Bewertungen' : 'Reviews';
  document.getElementById('ttl-reviews').innerHTML = lang === 'de' ? 'Was unsere Kunden <em>sagen</em>' : 'What Our Clients <em>Say</em>';
  document.getElementById('reviews-loading').textContent = lang === 'de' ? 'Bewertungen werden geladen…' : 'Loading reviews…';

  // Footer
  document.getElementById('footer-name').textContent = D.name;
  document.getElementById('footer-tagline').textContent = t(D.tagline);
  const igHandle2 = D.instagram?.replace('@','');
  document.getElementById('footer-ig').href = 'https://instagram.com/' + igHandle2;
  document.getElementById('footer-phone-link').href = 'tel:' + D.phone;
  document.getElementById('footer-col-nav').textContent = lang === 'de' ? 'Navigation' : 'Navigation';
  document.getElementById('footer-nav').innerHTML = navLinks.map(l =>
    `<li><a href="${l.href}">${t(l)}</a></li>`).join('');
  document.getElementById('footer-col-contact').textContent = lang === 'de' ? 'Kontakt' : 'Contact';
  document.getElementById('footer-contact-list').innerHTML = [
    `<li><a href="tel:${D.phone}">${D.phone}</a></li>`,
    `<li><a href="mailto:${D.email}">${D.email}</a></li>`,
    `<li><span style="color:rgba(255,255,255,0.38)">${D.address}</span></li>`
  ].join('');
  document.getElementById('footer-copy').innerHTML =
    `&copy; ${new Date().getFullYear()} ${D.name} · <a href="https://web.lokalonline.at">lokalonline.at</a>`;
}

// ─── FORM SUBMIT ────────────────────────────────────────────────
document.getElementById('booking-form').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('btn-book');
  const msg = document.getElementById('form-msg');
  btn.disabled = true;
  btn.textContent = lang === 'de' ? 'Wird gesendet…' : 'Sending…';
  msg.textContent = ''; msg.className = 'form-msg';
  const payload = {
    client_slug: D.slug,
    name:        document.getElementById('f-name').value.trim(),
    phone:       document.getElementById('f-phone').value.trim(),
    date:        document.getElementById('f-date').value,
    time:        document.getElementById('f-time').value,
    guests:      1,
    notes:       (document.getElementById('f-service').value ? '[' + document.getElementById('f-service').value + '] ' : '') + document.getElementById('f-notes').value.trim(),
    lang:        lang
  };
  if (!payload.name || !payload.phone || !payload.date || !payload.time) {
    msg.textContent = lang === 'de' ? 'Bitte alle Pflichtfelder ausfüllen.' : 'Please fill in all required fields.';
    msg.className = 'form-msg err'; btn.disabled = false;
    btn.textContent = lang === 'de' ? 'Termin anfragen' : 'Request Appointment';
    return;
  }
  const { error } = await sb.from('reservations').insert([payload]);
  btn.disabled = false;
  btn.textContent = lang === 'de' ? 'Termin anfragen' : 'Request Appointment';
  if (error) {
    msg.textContent = lang === 'de' ? 'Fehler beim Senden. Bitte versuchen Sie es erneut.' : 'Error sending. Please try again.';
    msg.className = 'form-msg err';
  } else {
    msg.textContent = lang === 'de' ? 'Vielen Dank! Wir melden uns bald.' : 'Thank you! We will be in touch soon.';
    msg.className = 'form-msg ok';
    e.target.reset();
  }
});

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
// ─── LOAD REVIEWS ────────────────────────────────────────────────
async function loadReviews() {
  const { data, error } = await sb.from('reviews')
    .select('*')
    .eq('client_slug', D.reviewSlug)
    .order('created_at', { ascending: false })
    .limit(6);
  const container = document.getElementById('reviews-container');
  if (error || !data || data.length === 0) {
    container.innerHTML = `<p class="reviews-empty">${lang==='de'?'Noch keine Bewertungen vorhanden.':'No reviews yet.'}</p>`;
    return;
  }
  container.innerHTML = `<div class="reviews-grid">${data.map(r => `
    <div class="review-card">
      <div class="review-stars">${'★'.repeat(r.rating||5)}${'☆'.repeat(5-(r.rating||5))}</div>
      <p class="review-text">"${esc(r.text || r.comment || '')}"</p>
      <div class="review-author">${esc(r.name || r.author || 'Anonymus')}</div>
    </div>`).join('')}</div>`;
}

// ─── INIT ────────────────────────────────────────────────────────
render();
loadReviews();
</script>
