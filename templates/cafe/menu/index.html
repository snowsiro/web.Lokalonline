<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Karte</title>
  <meta name="description" id="page-desc" content="">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #B8763A;
      --accent:  #B8763A;
      --bg:      #FAF7F2;
      --dark:    #1C1208;
      --mid:     #8C7B6B;
      --dim:     #5A4A3A;
      --line:    #E8E0D4;
      --font-heading: 'Playfair Display', Georgia, serif;
      --font-body:    'Inter', system-ui, sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--dark);
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.65;
      overflow-x: hidden;
    }

    /* ── NAV ── */
    #main-nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      height: 72px;
      background: rgba(250,247,242,.96);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
    }

    .nav-logo {
      font-family: var(--font-heading);
      font-size: 22px;
      color: var(--dark);
      text-decoration: none;
      letter-spacing: .01em;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .nav-back {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--mid);
      text-decoration: none;
      font-size: 13px;
      letter-spacing: .06em;
      transition: color .2s;
    }
    .nav-back:hover { color: var(--primary); }

    .lang-bar {
      display: flex;
      align-items: center;
      gap: 2px;
    }
    .lang-btn {
      background: none;
      border: none;
      color: var(--mid);
      font-family: var(--font-body);
      font-size: 11px;
      letter-spacing: .1em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 4px 7px;
      transition: color .2s;
    }
    .lang-btn.active { color: var(--dark); font-weight: 500; }
    .lang-btn:hover  { color: var(--primary); }
    .lang-sep { color: var(--line); font-size: 12px; }

    /* ── HERO ── */
    #hero {
      padding-top: 72px;
      background: var(--dark);
      position: relative;
      overflow: hidden;
    }

    .hero-inner {
      padding: 80px 10vw 72px;
      position: relative;
      z-index: 1;
    }

    .hero-eyebrow {
      font-size: 11px;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--primary);
      margin-bottom: 20px;
    }

    .hero-title {
      font-family: var(--font-heading);
      font-size: clamp(44px, 5.5vw, 72px);
      line-height: 1.1;
      color: #fff;
      margin-bottom: 20px;
    }
    .hero-title em { font-style: italic; color: var(--primary); }

    .hero-sub {
      font-size: 15px;
      color: rgba(255,255,255,.5);
      max-width: 480px;
      font-weight: 300;
    }

    /* decorative circles */
    .hero-deco {
      position: absolute;
      top: -120px; right: -80px;
      width: 480px;
      height: 480px;
      border-radius: 50%;
      border: 1px solid rgba(184,118,58,.12);
      pointer-events: none;
    }
    .hero-deco::before {
      content: '';
      position: absolute;
      inset: 48px;
      border-radius: 50%;
      border: 1px solid rgba(184,118,58,.08);
    }

    /* ── CATEGORY NAV ── */
    #cat-nav {
      position: sticky;
      top: 72px;
      z-index: 90;
      background: var(--bg);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: stretch;
      overflow-x: auto;
      scrollbar-width: none;
      padding: 0 10vw;
    }
    #cat-nav::-webkit-scrollbar { display: none; }

    .cat-nav-link {
      flex-shrink: 0;
      padding: 16px 22px;
      color: var(--mid);
      text-decoration: none;
      font-size: 13px;
      letter-spacing: .04em;
      transition: color .2s;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
    }
    .cat-nav-link:hover { color: var(--dark); }
    .cat-nav-link.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
      font-weight: 500;
    }

    /* ── MAIN ── */
    #menu-content {
      padding: 0 10vw 100px;
    }

    /* ── CATEGORY ── */
    .menu-category {
      padding-top: 72px;
    }

    .cat-header {
      margin-bottom: 36px;
    }

    .cat-title {
      font-family: var(--font-heading);
      font-size: clamp(26px, 3vw, 38px);
      color: var(--dark);
      margin-bottom: 8px;
    }

    .cat-divider {
      width: 40px;
      height: 2px;
      background: var(--primary);
      margin-top: 12px;
    }

    /* ── ITEM LIST ── */
    .menu-items {
      display: flex;
      flex-direction: column;
    }

    .menu-item {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 24px;
      padding: 24px 0;
      border-bottom: 1px solid var(--line);
      transition: opacity .2s;
    }
    .menu-item:last-child { border-bottom: none; }

    .item-left { flex: 1; min-width: 0; }

    .item-name {
      font-family: var(--font-heading);
      font-size: 17px;
      color: var(--dark);
      margin-bottom: 5px;
    }

    .item-desc {
      font-size: 13px;
      color: var(--mid);
      line-height: 1.6;
      font-weight: 300;
    }

    .item-allergen {
      margin-top: 6px;
      font-size: 11px;
      color: rgba(90,74,58,.5);
      letter-spacing: .04em;
    }
    .item-allergen::before {
      content: '⚠ ';
      font-size: 10px;
    }

    .item-right {
      flex-shrink: 0;
      text-align: right;
    }

    .item-price {
      font-family: var(--font-heading);
      font-size: 17px;
      color: var(--primary);
    }

    /* ── ALLERGEN NOTE ── */
    #allergen-note {
      padding: 32px 10vw;
      background: rgba(184,118,58,.06);
      border-top: 1px solid rgba(184,118,58,.15);
      border-bottom: 1px solid rgba(184,118,58,.15);
    }

    .allergen-note-text {
      font-size: 12px;
      color: var(--mid);
      max-width: 640px;
    }

    /* ── INFO STRIP ── */
    #info-strip {
      background: var(--dark);
      padding: 56px 10vw;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 40px;
    }

    .info-col-title {
      font-size: 11px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: rgba(255,255,255,.3);
      margin-bottom: 16px;
    }

    .info-col-body {
      font-size: 14px;
      color: rgba(255,255,255,.65);
      line-height: 1.8;
    }
    .info-col-body a {
      color: var(--primary);
      text-decoration: none;
    }
    .info-col-body a:hover { text-decoration: underline; }

    /* ── FOOTER ── */
    #menu-footer {
      padding: 28px 10vw;
      background: var(--dark);
      border-top: 1px solid rgba(255,255,255,.06);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .footer-name {
      font-family: var(--font-heading);
      font-size: 18px;
      color: #fff;
    }

    .footer-copy {
      font-size: 12px;
      color: rgba(255,255,255,.25);
    }

    .footer-links {
      display: flex;
      gap: 20px;
    }
    .footer-links a {
      color: rgba(255,255,255,.3);
      text-decoration: none;
      font-size: 12px;
      transition: color .2s;
    }
    .footer-links a:hover { color: rgba(255,255,255,.6); }

    /* ── REVEAL ── */
    .reveal {
      opacity: 0;
      transform: translateY(18px);
      transition: opacity .65s ease, transform .65s ease;
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      #main-nav { padding: 0 20px; }
      .hero-inner { padding: 60px 6vw 56px; }
      #cat-nav { padding: 0 6vw; }
      #menu-content { padding: 0 6vw 80px; }
      #allergen-note { padding: 28px 6vw; }
      #info-strip { padding: 48px 6vw; }
      #menu-footer { padding: 24px 6vw; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav id="main-nav">
    <a href="../" class="nav-logo" id="nav-logo">Café</a>
    <div class="nav-right">
      <div class="lang-bar">
        <button class="lang-btn" data-lang="de" onclick="setLang('de')">DE</button>
        <span class="lang-sep">/</span>
        <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
      </div>
      <a href="../" class="nav-back" id="nav-back">
        <span>←</span>
        <span id="nav-back-text">Zurück</span>
      </a>
    </div>
  </nav>

  <!-- HERO -->
  <header id="hero">
    <div class="hero-deco"></div>
    <div class="hero-inner">
      <p class="hero-eyebrow" id="hero-eyebrow">Unsere Karte</p>
      <h1 class="hero-title" id="hero-title">Kaffee &amp;<br><em>Speisen</em></h1>
      <p class="hero-sub" id="hero-sub"></p>
    </div>
  </header>

  <!-- CATEGORY NAV -->
  <nav id="cat-nav" aria-label="Kategorien"></nav>

  <!-- MENU CONTENT -->
  <main id="menu-content"></main>

  <!-- ALLERGEN NOTE -->
  <div id="allergen-note">
    <p class="allergen-note-text" id="allergen-text"></p>
  </div>

  <!-- INFO STRIP -->
  <section id="info-strip">
    <div>
      <div class="info-col-title" id="info-hours-label">Öffnungszeiten</div>
      <div class="info-col-body" id="info-hours"></div>
    </div>
    <div>
      <div class="info-col-title" id="info-contact-label">Kontakt</div>
      <div class="info-col-body" id="info-contact"></div>
    </div>
    <div>
      <div class="info-col-title" id="info-addr-label">Adresse</div>
      <div class="info-col-body" id="info-addr"></div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer id="menu-footer">
    <div>
      <div class="footer-name" id="footer-name"></div>
      <div class="footer-copy" id="footer-copy"></div>
    </div>
    <div class="footer-links">
      <a href="../impressum/">Impressum</a>
      <a href="../datenschutz/">Datenschutz</a>
    </div>
  </footer>

  <script src="../data.js"></script>
  <script src="menu-data.js"></script>
  <script>
  (function () {
    'use strict';

    const D  = window.SITE_DATA;
    const MD = window.MENU_DATA;
    let lang = localStorage.getItem('lang') || 'de';

    function t(obj) {
      if (!obj) return '';
      return obj[lang] || obj.de || '';
    }
    function setText(id, val) { const el = document.getElementById(id); if (el) el.textContent = val; }
    function setHTML(id, val) { const el = document.getElementById(id); if (el) el.innerHTML = val; }

    function setLang(l) {
      lang = l;
      localStorage.setItem('lang', l);
      document.documentElement.lang = l;
      document.querySelectorAll('.lang-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.lang === l)
      );
      renderAll();
    }
    window.setLang = setLang;

    function applyCSSVars() {
      const r = document.documentElement;
      const c = D.colors;
      r.style.setProperty('--primary', c.primary);
      r.style.setProperty('--accent',  c.accent);
      r.style.setProperty('--bg',      c.bg);
      r.style.setProperty('--dark',    c.dark);
      r.style.setProperty('--mid',     c.mid);
      r.style.setProperty('--dim',     c.dim);
      r.style.setProperty('--line',    c.line);
      r.style.setProperty('--font-heading', `'${D.fonts.heading}', Georgia, serif`);
      r.style.setProperty('--font-body',    `'${D.fonts.body}', system-ui, sans-serif`);
    }

    function renderNav() {
      const navLogoEl = document.getElementById('nav-logo');
      if (navLogoEl) {
        if (D.logo) {
          navLogoEl.innerHTML = '<img src="../' + D.logo + '" alt="' + D.name + '" style="height:40px;width:auto;display:block">';
        } else { navLogoEl.textContent = D.name; }
      }
      setText('nav-back-text', lang === 'en' ? 'Back' : 'Zurück');
    }

    function renderHero() {
      document.title = (lang === 'en' ? 'Menu' : 'Karte') + ' — ' + D.name;
      setText('hero-eyebrow', lang === 'en' ? 'Our Menu' : 'Unsere Karte');
      setHTML('hero-title', lang === 'en' ? 'Coffee &amp;<br><em>Food</em>' : 'Kaffee &amp;<br><em>Speisen</em>');
      setText('hero-sub', t(D.tagline));
    }

    function renderCatNav() {
      const nav = document.getElementById('cat-nav');
      if (!nav || !MD.categories) return;
      nav.innerHTML = MD.categories.map((cat, i) =>
        `<a class="cat-nav-link${i === 0 ? ' active' : ''}" href="#cat-${i}" data-idx="${i}">${t(cat.name)}</a>`
      ).join('');
    }

    function renderMenu() {
      const content = document.getElementById('menu-content');
      if (!content || !MD.categories) return;

      content.innerHTML = MD.categories.map((cat, i) => {
        const items = cat.items.map(item => {
          const allergenHtml = item.allergen
            ? `<div class="item-allergen">${t(item.allergen)}</div>`
            : '';
          return `
            <div class="menu-item reveal">
              <div class="item-left">
                <div class="item-name">${t(item.name)}</div>
                <div class="item-desc">${t(item.desc)}</div>
                ${allergenHtml}
              </div>
              <div class="item-right">
                <div class="item-price">${item.price}</div>
              </div>
            </div>`;
        }).join('');

        return `
          <section class="menu-category" id="cat-${i}">
            <div class="cat-header reveal">
              <h2 class="cat-title">${t(cat.name)}</h2>
              <div class="cat-divider"></div>
            </div>
            <div class="menu-items">${items}</div>
          </section>`;
      }).join('');
    }

    function renderAllergenNote() {
      setText('allergen-text', lang === 'en'
        ? 'Allergen information is available on request. Items marked with ⚠ contain common allergens. All prices include VAT.'
        : 'Allergeninformationen erhalten Sie auf Anfrage. Mit ⚠ markierte Artikel enthalten häufige Allergene. Alle Preise inkl. MwSt.'
      );
    }

    function renderInfo() {
      setText('info-hours-label', lang === 'en' ? 'Opening Hours' : 'Öffnungszeiten');
      setText('info-contact-label', lang === 'en' ? 'Contact' : 'Kontakt');
      setText('info-addr-label', lang === 'en' ? 'Address' : 'Adresse');

      if (D.hours) {
        setHTML('info-hours', D.hours.map(h =>
          `<div>${t(h.day)}: ${h.time || (lang === 'en' ? 'Closed' : 'Geschlossen')}</div>`
        ).join(''));
      }

      setHTML('info-contact', `
        <div><a href="tel:${D.phone}">${D.phone}</a></div>
        <div><a href="mailto:${D.email}">${D.email}</a></div>
      `);

      setText('info-addr', D.address);
    }

    function renderFooter() {
      setText('footer-name', D.name);
      setText('footer-copy', '© ' + new Date().getFullYear() + ' ' + D.name);
    }

    function initScrollSpy() {
      const sections = document.querySelectorAll('.menu-category');
      const links    = document.querySelectorAll('.cat-nav-link');
      if (!sections.length) return;

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const idx = entry.target.id.replace('cat-', '');
            links.forEach(l => l.classList.toggle('active', l.dataset.idx === idx));
          }
        });
      }, { rootMargin: '-25% 0px -65% 0px' });

      sections.forEach(s => observer.observe(s));
    }

    function initReveal() {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
      }, { threshold: 0.06 });
      document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    }

    function renderAll() {
      renderNav();
      renderHero();
      renderCatNav();
      renderMenu();
      renderAllergenNote();
      renderInfo();
      renderFooter();
      setTimeout(() => { initReveal(); initScrollSpy(); }, 50);
    }

    function init() {
      applyCSSVars();
      document.querySelectorAll('.lang-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.lang === lang)
      );
      document.documentElement.lang = lang;
      renderAll();
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  })();
  </script>
</body>
</html>
