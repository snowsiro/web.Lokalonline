<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Speisekarte</title>
  <meta name="description" id="page-desc" content="">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #C8302A;
      --accent:  #C8302A;
      --bg:      #F8F7F4;
      --dark:    #111110;
      --mid:     #9B9893;
      --dim:     #5C5A57;
      --line:    #DDDAD4;
      --font-heading: 'DM Serif Display', Georgia, serif;
      --font-body:    'DM Sans', system-ui, sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--dark);
      color: var(--bg);
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ── LANG BAR ── */
    #lang-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      background: rgba(17,17,16,.98);
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 32px;
      gap: 4px;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }

    .lang-btn {
      background: none;
      border: none;
      color: var(--mid);
      font-family: var(--font-body);
      font-size: 11px;
      letter-spacing: .12em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 4px 8px;
      transition: color .2s;
    }
    .lang-btn.active { color: var(--bg); }
    .lang-btn:hover  { color: var(--bg); }
    .lang-sep { color: #333; font-size: 11px; }

    /* ── NAV ── */
    #main-nav {
      position: fixed;
      top: 36px; left: 0; right: 0;
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      height: 64px;
      background: rgba(17,17,16,.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,.06);
    }

    .nav-logo {
      font-family: var(--font-heading);
      font-size: 20px;
      color: #fff;
      text-decoration: none;
    }

    .nav-back {
      display: flex;
      align-items: center;
      gap: 8px;
      color: rgba(255,255,255,.55);
      text-decoration: none;
      font-size: 13px;
      letter-spacing: .06em;
      transition: color .2s;
    }
    .nav-back:hover { color: #fff; }
    .nav-back-arrow { font-size: 16px; }

    /* ── HERO BAND ── */
    #hero-band {
      padding-top: calc(36px + 64px);
      background: var(--dark);
      padding-bottom: 0;
    }

    .hero-inner {
      padding: 80px 10vw 64px;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }

    .hero-eyebrow {
      font-size: 11px;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--primary);
      margin-bottom: 20px;
    }

    .hero-title {
      font-family: var(--font-heading);
      font-size: clamp(48px, 6vw, 80px);
      line-height: 1.05;
      color: #fff;
      margin-bottom: 24px;
    }
    .hero-title em { font-style: italic; color: var(--primary); }

    .hero-sub {
      font-size: 15px;
      color: rgba(255,255,255,.45);
      max-width: 520px;
      font-weight: 300;
    }

    /* ── CATEGORY NAV ── */
    #cat-nav {
      position: sticky;
      top: calc(36px + 64px);
      z-index: 90;
      background: rgba(17,17,16,.97);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,.06);
      display: flex;
      align-items: center;
      gap: 0;
      overflow-x: auto;
      scrollbar-width: none;
      padding: 0 10vw;
    }
    #cat-nav::-webkit-scrollbar { display: none; }

    .cat-nav-link {
      flex-shrink: 0;
      padding: 18px 24px;
      color: rgba(255,255,255,.4);
      text-decoration: none;
      font-size: 12px;
      letter-spacing: .12em;
      text-transform: uppercase;
      transition: color .2s;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
    }
    .cat-nav-link:hover { color: rgba(255,255,255,.8); }
    .cat-nav-link.active {
      color: #fff;
      border-bottom-color: var(--primary);
    }

    /* ── MAIN CONTENT ── */
    #menu-content {
      padding: 0 10vw 100px;
    }

    /* ── CATEGORY SECTION ── */
    .menu-category {
      padding-top: 80px;
    }

    .cat-header {
      display: flex;
      align-items: baseline;
      gap: 24px;
      margin-bottom: 40px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }

    .cat-number {
      font-family: var(--font-heading);
      font-size: 13px;
      color: var(--primary);
      letter-spacing: .1em;
    }

    .cat-title {
      font-family: var(--font-heading);
      font-size: clamp(28px, 3.5vw, 44px);
      color: #fff;
      line-height: 1.1;
    }

    /* ── MENU ITEMS GRID ── */
    .menu-items {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px;
    }

    @media (max-width: 768px) {
      .menu-items { grid-template-columns: 1fr; }
    }

    .menu-item {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 24px;
      padding: 28px 32px;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.05);
      transition: background .2s, border-color .2s;
      cursor: default;
    }
    .menu-item:hover {
      background: rgba(255,255,255,.055);
      border-color: rgba(255,255,255,.1);
    }

    .item-text { flex: 1; min-width: 0; }

    .item-name {
      font-family: var(--font-heading);
      font-size: 18px;
      color: #fff;
      margin-bottom: 6px;
      line-height: 1.2;
    }

    .item-name-alt {
      font-size: 12px;
      color: rgba(255,255,255,.3);
      font-style: italic;
      margin-bottom: 8px;
    }

    .item-desc {
      font-size: 13px;
      color: rgba(255,255,255,.45);
      line-height: 1.65;
      font-weight: 300;
    }

    .item-price {
      font-family: var(--font-heading);
      font-size: 18px;
      color: var(--primary);
      white-space: nowrap;
      flex-shrink: 0;
      padding-top: 2px;
    }

    /* ── DIVIDER ── */
    .section-divider {
      height: 1px;
      background: rgba(255,255,255,.06);
      margin: 40px 0;
    }

    /* ── INFO BAND ── */
    #info-band {
      background: rgba(255,255,255,.03);
      border-top: 1px solid rgba(255,255,255,.08);
      border-bottom: 1px solid rgba(255,255,255,.08);
      padding: 48px 10vw;
      display: flex;
      gap: 48px;
      flex-wrap: wrap;
    }

    .info-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
    }

    .info-icon {
      width: 40px;
      height: 40px;
      border: 1px solid rgba(255,255,255,.12);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .info-label {
      font-size: 11px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: rgba(255,255,255,.3);
      margin-bottom: 4px;
    }

    .info-value {
      font-size: 14px;
      color: rgba(255,255,255,.7);
    }

    /* ── FOOTER ── */
    #menu-footer {
      padding: 40px 10vw;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
      border-top: 1px solid rgba(255,255,255,.06);
    }

    .footer-name {
      font-family: var(--font-heading);
      font-size: 20px;
      color: #fff;
    }

    .footer-copy {
      font-size: 12px;
      color: rgba(255,255,255,.25);
    }

    .footer-links {
      display: flex;
      gap: 24px;
    }
    .footer-links a {
      color: rgba(255,255,255,.3);
      text-decoration: none;
      font-size: 12px;
      transition: color .2s;
    }
    .footer-links a:hover { color: rgba(255,255,255,.6); }

    /* ── SCROLL REVEAL ── */
    .reveal {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity .6s ease, transform .6s ease;
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      #main-nav { padding: 0 20px; }
      .hero-inner { padding: 60px 6vw 48px; }
      #cat-nav { padding: 0 6vw; }
      #menu-content { padding: 0 6vw 80px; }
      .menu-item { padding: 20px 16px; }
      #info-band { padding: 40px 6vw; flex-direction: column; gap: 28px; }
      #menu-footer { padding: 32px 6vw; flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <!-- LANG BAR -->
  <div id="lang-bar">
    <button class="lang-btn" data-lang="de" onclick="setLang('de')">DE</button>
    <span class="lang-sep">/</span>
    <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
    <span class="lang-sep">/</span>
    <button class="lang-btn" data-lang="ko" onclick="setLang('ko')">한국어</button>
  </div>

  <!-- NAV -->
  <nav id="main-nav">
    <a href="../" class="nav-logo" id="nav-logo">Restaurant</a>
    <a href="../" class="nav-back" id="nav-back">
      <span class="nav-back-arrow">←</span>
      <span id="nav-back-text">Zurück</span>
    </a>
  </nav>

  <!-- HERO BAND -->
  <section id="hero-band">
    <div class="hero-inner">
      <p class="hero-eyebrow" id="hero-eyebrow">Speisekarte</p>
      <h1 class="hero-title" id="hero-title">Unsere<br><em>Gerichte</em></h1>
      <p class="hero-sub" id="hero-sub"></p>
    </div>
  </section>

  <!-- CATEGORY NAV -->
  <nav id="cat-nav" aria-label="Menu categories"></nav>

  <!-- MENU CONTENT -->
  <main id="menu-content"></main>

  <!-- INFO BAND -->
  <section id="info-band">
    <div class="info-item">
      <div class="info-icon">📍</div>
      <div>
        <div class="info-label" id="info-addr-label">Adresse</div>
        <div class="info-value" id="info-addr"></div>
      </div>
    </div>
    <div class="info-item">
      <div class="info-icon">📞</div>
      <div>
        <div class="info-label" id="info-phone-label">Telefon</div>
        <div class="info-value"><a id="info-phone" href="#" style="color:inherit;text-decoration:none;"></a></div>
      </div>
    </div>
    <div class="info-item">
      <div class="info-icon">🕐</div>
      <div>
        <div class="info-label" id="info-hours-label">Öffnungszeiten</div>
        <div class="info-value" id="info-hours"></div>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer id="menu-footer">
    <div>
      <div class="footer-name" id="footer-name"></div>
      <div class="footer-copy" id="footer-copy"></div>
    </div>
    <div class="footer-links">
      <a href="../impressum/">Impressum</a>
      <a href="../datenschutz/">Datenschutz</a>
    </div>
  </footer>

  <script src="../data.js"></script>
  <script src="menu-data.js"></script>
  <script>
  (function () {
    'use strict';

    const D  = window.SITE_DATA;
    const MD = window.MENU_DATA;
    let lang = localStorage.getItem('lang') || 'de';

    /* ── UTILS ── */
    function t(obj) {
      if (!obj) return '';
      return obj[lang] || obj.de || '';
    }

    function setText(id, val) {
      const el = document.getElementById(id);
      if (el) el.textContent = val;
    }
    function setHTML(id, val) {
      const el = document.getElementById(id);
      if (el) el.innerHTML = val;
    }

    /* ── LANG ── */
    function setLang(l) {
      lang = l;
      localStorage.setItem('lang', l);
      document.documentElement.lang = l;
      document.querySelectorAll('.lang-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.lang === l)
      );
      renderAll();
    }
    window.setLang = setLang;

    /* ── CSS VARS ── */
    function applyCSSVars() {
      const r = document.documentElement;
      const c = D.colors;
      r.style.setProperty('--primary', c.primary);
      r.style.setProperty('--accent',  c.accent);
      r.style.setProperty('--bg',      c.bg);
      r.style.setProperty('--dark',    c.dark);
      r.style.setProperty('--mid',     c.mid);
      r.style.setProperty('--dim',     c.dim);
      r.style.setProperty('--line',    c.line);
      r.style.setProperty('--font-heading', `'${D.fonts.heading}', Georgia, serif`);
      r.style.setProperty('--font-body',    `'${D.fonts.body}', system-ui, sans-serif`);
    }

    /* ── NAV ── */
    function renderNav() {
      const logo = document.getElementById('nav-logo');
      if (logo) {
        if (D.logo) {
          logo.innerHTML = '<img src="../' + D.logo + '" alt="' + D.name + '" style="height:40px;width:auto;display:block">';
        } else {
          logo.textContent = D.name;
        }
      }

      const backText = document.getElementById('nav-back-text');
      if (backText) backText.textContent = lang === 'ko' ? '뒤로' : (lang === 'en' ? 'Back' : 'Zurück');
    }

    /* ── HERO ── */
    function renderHero() {
      document.title = (lang === 'ko' ? '메뉴' : (lang === 'en' ? 'Menu' : 'Speisekarte')) + ' — ' + D.name;
      setText('page-desc', t(D.seo && D.seo.description) || '');

      setText('hero-eyebrow', lang === 'ko' ? '메뉴' : (lang === 'en' ? 'Menu' : 'Speisekarte'));
      setHTML('hero-title',
        lang === 'ko' ? '저희의<br><em>메뉴</em>' :
        lang === 'en' ? 'Our<br><em>Menu</em>' :
        'Unsere<br><em>Gerichte</em>'
      );
      setText('hero-sub', t(D.tagline));
    }

    /* ── CATEGORY NAV ── */
    function renderCatNav() {
      const nav = document.getElementById('cat-nav');
      if (!nav || !MD.categories) return;
      nav.innerHTML = MD.categories.map((cat, i) =>
        `<a class="cat-nav-link${i === 0 ? ' active' : ''}" href="#cat-${i}" data-idx="${i}">${t(cat.name)}</a>`
      ).join('');
    }

    /* ── MENU ITEMS ── */
    function renderMenu() {
      const content = document.getElementById('menu-content');
      if (!content || !MD.categories) return;

      content.innerHTML = MD.categories.map((cat, i) => {
        const items = cat.items.map(item => {
          const altLang = lang === 'en' ? 'de' : (lang === 'ko' ? 'de' : 'en');
          const altName = item.name[altLang] && item.name[altLang] !== t(item.name) ? item.name[altLang] : '';
          return `
            <div class="menu-item">
              <div class="item-text">
                <div class="item-name">${t(item.name)}</div>
                ${altName ? `<div class="item-name-alt">${altName}</div>` : ''}
                <div class="item-desc">${t(item.desc)}</div>
              </div>
              <div class="item-price">${item.price}</div>
            </div>`;
        }).join('');

        return `
          <section class="menu-category reveal" id="cat-${i}">
            <div class="cat-header">
              <span class="cat-number">0${i + 1}</span>
              <h2 class="cat-title">${t(cat.name)}</h2>
            </div>
            <div class="menu-items">${items}</div>
          </section>`;
      }).join('');
    }

    /* ── INFO BAND ── */
    function renderInfo() {
      setText('info-addr-label', lang === 'ko' ? '주소' : (lang === 'en' ? 'Address' : 'Adresse'));
      setText('info-phone-label', lang === 'ko' ? '전화' : (lang === 'en' ? 'Phone' : 'Telefon'));
      setText('info-hours-label', lang === 'ko' ? '영업시간' : (lang === 'en' ? 'Opening Hours' : 'Öffnungszeiten'));
      setText('info-addr', D.address);

      const phoneEl = document.getElementById('info-phone');
      if (phoneEl) { phoneEl.textContent = D.phone; phoneEl.href = 'tel:' + D.phone; }

      if (D.hours && D.hours.length) {
        const hoursText = D.hours.map(h =>
          `${t(h.day)}: ${h.closed ? (lang === 'ko' ? '휴무' : (lang === 'en' ? 'Closed' : 'Geschlossen')) : h.time}`
        ).join(' · ');
        setText('info-hours', hoursText);
      }
    }

    /* ── FOOTER ── */
    function renderFooter() {
      setText('footer-name', D.name);
      setText('footer-copy', '© ' + new Date().getFullYear() + ' ' + D.name);
    }

    /* ── CATEGORY NAV SCROLL SPY ── */
    function initScrollSpy() {
      const sections = document.querySelectorAll('.menu-category');
      const links    = document.querySelectorAll('.cat-nav-link');
      if (!sections.length || !links.length) return;

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const idx = entry.target.id.replace('cat-', '');
            links.forEach(l => l.classList.toggle('active', l.dataset.idx === idx));
          }
        });
      }, { rootMargin: '-30% 0px -60% 0px' });

      sections.forEach(s => observer.observe(s));
    }

    /* ── SCROLL REVEAL ── */
    function initReveal() {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
      }, { threshold: 0.08 });
      document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    }

    /* ── RENDER ALL ── */
    function renderAll() {
      renderNav();
      renderHero();
      renderCatNav();
      renderMenu();
      renderInfo();
      renderFooter();
      // Re-init observers after re-render
      setTimeout(() => { initReveal(); initScrollSpy(); }, 50);
    }

    /* ── INIT ── */
    function init() {
      applyCSSVars();
      document.querySelectorAll('.lang-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.lang === lang)
      );
      document.documentElement.lang = lang;
      renderAll();
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  })();
  </script>
</body>
</html>
