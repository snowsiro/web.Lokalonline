<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="seo-title">Shop</title>
<meta name="description" id="seo-desc" content="">
<meta property="og:image" id="seo-og" content="">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --primary: #E85D26;
  --accent:  #E85D26;
  --bg:      #F5F5F5;
  --dark:    #0A0A0A;
  --mid:     #6B6B6B;
  --dim:     #999999;
  --line:    #E0E0E0;
  --white:   #FFFFFF;
  --font-heading: 'Space Grotesk', sans-serif;
  --font-body:    'Inter', sans-serif;
}
html { scroll-behavior: smooth; }
body { font-family: var(--font-body); background: var(--white); color: var(--dark); overflow-x: hidden; }

/* ── ANNOUNCEMENT BAR ── */
.announce-bar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 400;
  height: 38px; background: var(--primary);
  display: flex; align-items: center; justify-content: center;
  padding: 0 48px; gap: 20px;
}
.announce-text {
  font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase;
  color: #fff; text-align: center;
}
.announce-bar .lang-toggle { position: absolute; right: 48px; display: flex; }
.lang-btn {
  background: none; border: none; cursor: pointer;
  font-family: var(--font-body); font-size: 10px; font-weight: 500;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: rgba(255,255,255,0.5); padding: 4px 8px;
  transition: color 0.2s;
}
.lang-btn.active { color: #fff; }

/* ── NAV ── */
nav {
  position: fixed; top: 38px; left: 0; right: 0; z-index: 300;
  height: 64px; display: flex; align-items: center;
  padding: 0 48px;
  background: rgba(255,255,255,0.98);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid transparent;
  transition: border-color 0.3s, box-shadow 0.3s;
}
nav.scrolled { border-color: var(--line); box-shadow: 0 2px 20px rgba(0,0,0,0.06); }
.nav-logo {
  font-family: var(--font-heading); font-size: 20px; font-weight: 700;
  letter-spacing: -0.02em; color: var(--dark); text-decoration: none;
  text-transform: uppercase; white-space: nowrap; flex-shrink: 0;
}
.nav-links-center {
  display: flex; gap: 0; list-style: none; align-items: center;
  position: absolute; left: 50%; transform: translateX(-50%);
}
.nav-links-center a {
  font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--mid); text-decoration: none; padding: 8px 16px;
  transition: color 0.2s; white-space: nowrap;
}
.nav-links-center a:hover { color: var(--dark); }
.nav-cta {
  margin-left: auto; font-size: 11px; font-weight: 600; letter-spacing: 0.1em;
  text-transform: uppercase; color: #fff; text-decoration: none;
  background: var(--dark); padding: 10px 22px;
  transition: background 0.25s; white-space: nowrap;
}
.nav-cta:hover { background: var(--primary); }
.hamburger { display: none; background: none; border: none; cursor: pointer; padding: 8px; flex-direction: column; gap: 5px; margin-left: auto; }
.hamburger span { display: block; width: 24px; height: 2px; background: var(--dark); transition: all 0.3s; }
.mobile-menu { display: none; position: fixed; inset: 0; background: var(--dark); z-index: 500; flex-direction: column; align-items: flex-start; justify-content: center; padding: 0 48px; gap: 4px; }
.mobile-menu.open { display: flex; }
.mobile-menu a {
  font-family: var(--font-heading); font-size: 40px; font-weight: 700;
  color: rgba(255,255,255,0.88); text-decoration: none; text-transform: uppercase;
  letter-spacing: -0.02em; padding: 8px 0;
  transition: color 0.2s;
}
.mobile-menu a:hover { color: var(--primary); }
.mobile-menu-close { position: absolute; top: 102px; right: 24px; background: none; border: none; font-size: 32px; cursor: pointer; color: rgba(255,255,255,0.6); }

/* ── HERO ── */
#hero {
  position: relative; min-height: 100vh;
  display: flex; align-items: flex-end;
  padding-top: 102px; overflow: hidden;
}
.hero-bg {
  position: absolute; inset: 0;
  background: url('img/slide1.jpg') center/cover no-repeat;
}
.hero-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.35) 55%, rgba(0,0,0,0.1) 100%);
}
.hero-content {
  position: relative; z-index: 2;
  padding: 80px 80px 96px;
  max-width: 820px;
}
.hero-eyebrow {
  font-size: 11px; font-weight: 600; letter-spacing: 0.25em; text-transform: uppercase;
  color: var(--primary); margin-bottom: 20px; display: block;
}
.hero-title {
  font-family: var(--font-heading); font-size: clamp(52px, 7vw, 100px);
  font-weight: 700; line-height: 0.96; color: #fff;
  letter-spacing: -0.03em; margin-bottom: 28px;
  text-transform: uppercase;
}
.hero-title em { font-style: normal; color: var(--primary); }
.hero-desc { font-size: 16px; font-weight: 300; line-height: 1.7; color: rgba(255,255,255,0.7); margin-bottom: 40px; max-width: 480px; }
.hero-actions { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
.btn-primary {
  display: inline-block; padding: 16px 36px;
  background: var(--primary); color: #fff;
  font-family: var(--font-heading); font-size: 12px; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
  text-decoration: none; border: none; cursor: pointer;
  transition: background 0.25s, transform 0.15s;
}
.btn-primary:hover { background: #fff; color: var(--dark); }
.btn-outline-white {
  display: inline-block; padding: 14px 36px;
  background: transparent; color: rgba(255,255,255,0.75);
  font-family: var(--font-heading); font-size: 12px; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
  text-decoration: none; border: 2px solid rgba(255,255,255,0.3);
  transition: all 0.25s;
}
.btn-outline-white:hover { border-color: #fff; color: #fff; }

/* ── SECTION BASICS ── */
section { padding: 96px 0; }
.container { max-width: 1160px; margin: 0 auto; padding: 0 48px; }
.section-label {
  font-size: 10px; font-weight: 600; letter-spacing: 0.25em; text-transform: uppercase;
  color: var(--primary); margin-bottom: 12px; display: block;
}
.section-title {
  font-family: var(--font-heading); font-size: clamp(32px, 4vw, 54px);
  font-weight: 700; line-height: 1.0; color: var(--dark);
  letter-spacing: -0.03em; text-transform: uppercase;
}
.section-intro { font-size: 15px; font-weight: 300; line-height: 1.8; color: var(--mid); max-width: 560px; margin-top: 16px; }
.section-header { margin-bottom: 56px; }

/* ── CATEGORIES ── */
#categories { background: var(--bg); padding: 0 0 96px; }
.categories-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px;
  margin-top: 0;
}
.category-card {
  position: relative; overflow: hidden; cursor: pointer;
  height: 460px;
}
.category-img {
  position: absolute; inset: 0;
  background: center/cover no-repeat;
  transition: transform 0.6s ease;
}
.category-card:hover .category-img { transform: scale(1.05); }
.category-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.1) 60%);
  transition: background 0.4s;
}
.category-card:hover .category-overlay {
  background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.25) 60%);
}
.category-content {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 32px 28px;
}
.category-name {
  font-family: var(--font-heading); font-size: 26px; font-weight: 700;
  color: #fff; text-transform: uppercase; letter-spacing: -0.01em; margin-bottom: 12px;
}
.category-cta {
  font-size: 10px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--primary); text-decoration: none;
  display: inline-flex; align-items: center; gap: 8px;
  transition: gap 0.2s;
}
.category-card:hover .category-cta { gap: 14px; }

/* ── ABOUT / STORY ── */
#about { background: var(--white); }
.about-grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 80px; align-items: center; }
.about-left { }
.about-headline {
  font-family: var(--font-heading); font-size: clamp(44px, 5vw, 72px);
  font-weight: 700; line-height: 0.96; color: var(--dark);
  letter-spacing: -0.03em; text-transform: uppercase;
}
.about-headline em { color: var(--primary); font-style: normal; }
.about-right { }
.about-text { font-size: 15px; font-weight: 300; line-height: 1.85; color: var(--mid); margin-bottom: 28px; }
.about-highlights { list-style: none; display: flex; flex-direction: column; gap: 12px; }
.about-highlights li {
  display: flex; align-items: center; gap: 12px;
  font-size: 13px; font-weight: 500; color: var(--dark); letter-spacing: 0.02em;
}
.about-highlights li::before {
  content: ''; display: block; width: 24px; height: 2px;
  background: var(--primary); flex-shrink: 0;
}

/* ── HIGHLIGHTS ── */
#highlights { background: var(--dark); }
.highlights-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0; }
.highlight-box {
  padding: 56px 48px; border-right: 1px solid rgba(255,255,255,0.08);
  transition: background 0.25s;
}
.highlight-box:last-child { border-right: none; }
.highlight-box:hover { background: rgba(255,255,255,0.03); }
.highlight-icon {
  font-size: 28px; color: var(--primary); margin-bottom: 24px; display: block;
  line-height: 1;
}
.highlight-title {
  font-family: var(--font-heading); font-size: 20px; font-weight: 700;
  color: #fff; text-transform: uppercase; letter-spacing: -0.01em;
  margin-bottom: 12px;
}
.highlight-desc { font-size: 13px; font-weight: 300; line-height: 1.7; color: rgba(255,255,255,0.45); }

/* ── PRODUCTS ── */
#products { background: var(--bg); }
.products-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
.product-card { background: var(--white); overflow: hidden; transition: transform 0.25s; }
.product-card:hover { transform: translateY(-4px); }
.product-img-wrap { overflow: hidden; height: 280px; position: relative; background: var(--bg); }
.product-img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform 0.5s ease;
}
.product-card:hover .product-img { transform: scale(1.04); }
.product-info { padding: 24px; }
.product-name {
  font-family: var(--font-heading); font-size: 18px; font-weight: 700;
  color: var(--dark); text-transform: uppercase; letter-spacing: -0.01em;
  margin-bottom: 8px;
}
.product-desc { font-size: 13px; font-weight: 300; line-height: 1.6; color: var(--mid); }
.product-tag {
  display: inline-block; margin-top: 12px;
  font-size: 9px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--primary); border: 1px solid var(--primary); padding: 4px 10px;
}

/* ── HOURS + MAP ── */
#info { background: var(--white); }
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
.info-hours { padding: 80px 80px 80px 0; border-right: 1px solid var(--line); }
.info-contact { padding: 80px 0 80px 80px; }
.hours-list { list-style: none; margin-top: 32px; }
.hours-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 0; border-bottom: 1px solid var(--line); font-size: 14px;
}
.hours-day { font-weight: 500; color: var(--dark); }
.hours-time { color: var(--mid); font-weight: 300; }
.hours-closed { color: var(--dim); font-style: italic; font-weight: 300; }
.contact-info { margin-top: 32px; display: flex; flex-direction: column; gap: 16px; }
.contact-row { display: flex; align-items: flex-start; gap: 16px; }
.contact-icon { font-size: 16px; color: var(--primary); margin-top: 2px; flex-shrink: 0; width: 20px; }
.contact-data { font-size: 14px; font-weight: 300; line-height: 1.6; color: var(--mid); }
.contact-data a { color: var(--dark); text-decoration: none; font-weight: 500; }
.contact-data a:hover { color: var(--primary); }
.maps-btn {
  display: inline-block; margin-top: 24px; padding: 12px 28px;
  background: var(--dark); color: #fff;
  font-family: var(--font-heading); font-size: 11px; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
  text-decoration: none; transition: background 0.25s;
}
.maps-btn:hover { background: var(--primary); }

/* ── MAP ── */
#map { padding: 0; line-height: 0; }
#map iframe { width: 100%; height: 400px; border: 0; filter: grayscale(20%); }

/* ── CONTACT FORM ── */
#contact { background: var(--dark); }
.contact-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: start; }
.contact-info-col { padding-top: 8px; }
.contact-info-col .section-label { color: var(--primary); }
.contact-info-col .section-title { color: #fff; }
.contact-info-col .section-intro { color: rgba(255,255,255,0.45); }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-grid .full { grid-column: 1 / -1; }
.form-group { display: flex; flex-direction: column; gap: 8px; }
.form-group label { font-size: 10px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.4); }
.form-group input,
.form-group select,
.form-group textarea {
  font-family: var(--font-body); font-size: 14px; font-weight: 300;
  color: #fff; background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12); padding: 14px 16px;
  outline: none; transition: border-color 0.2s;
  appearance: none; -webkit-appearance: none; border-radius: 0;
}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus { border-color: var(--primary); }
.form-group textarea { resize: vertical; min-height: 110px; }
.form-group select option { background: var(--dark); }
.form-submit {
  display: inline-block; margin-top: 8px; padding: 16px 40px;
  background: var(--primary); color: #fff;
  font-family: var(--font-heading); font-size: 12px; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
  border: none; cursor: pointer; transition: background 0.25s;
}
.form-submit:hover { background: #fff; color: var(--dark); }
.form-msg { margin-top: 12px; font-size: 13px; font-weight: 300; min-height: 20px; color: rgba(255,255,255,0.5); }
.form-msg.ok { color: #5ecc74; }
.form-msg.err { color: #ff6b6b; }

/* ── REVIEWS ── */
#reviews { background: var(--bg); }
.reviews-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
.review-card {
  background: var(--white); padding: 36px;
  border-left: 3px solid transparent; transition: border-color 0.25s;
}
.review-card:hover { border-color: var(--primary); }
.review-stars { color: var(--primary); font-size: 14px; letter-spacing: 2px; margin-bottom: 16px; }
.review-text { font-size: 14px; font-weight: 300; line-height: 1.8; color: var(--mid); font-style: italic; margin-bottom: 20px; }
.review-author { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dark); }
.reviews-empty { font-size: 14px; color: var(--mid); font-style: italic; }

/* ── FOOTER ── */
footer { background: var(--dark); color: rgba(255,255,255,0.45); padding: 72px 0 32px; }
.footer-inner { display: grid; grid-template-columns: 1.8fr 1fr 1fr; gap: 56px; margin-bottom: 56px; }
.footer-brand-name {
  font-family: var(--font-heading); font-size: 28px; font-weight: 700;
  color: #fff; letter-spacing: -0.02em; text-transform: uppercase; margin-bottom: 12px;
}
.footer-tagline { font-size: 13px; font-weight: 300; line-height: 1.7; color: rgba(255,255,255,0.35); margin-bottom: 24px; }
.footer-social { display: flex; gap: 8px; }
.footer-social a {
  width: 38px; height: 38px; background: rgba(255,255,255,0.06);
  display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,0.4); text-decoration: none; font-size: 13px;
  transition: all 0.2s;
}
.footer-social a:hover { background: var(--primary); color: #fff; }
.footer-col-title {
  font-size: 10px; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase;
  color: rgba(255,255,255,0.4); margin-bottom: 20px;
}
.footer-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
.footer-list a {
  font-size: 13px; font-weight: 300; color: rgba(255,255,255,0.35);
  text-decoration: none; transition: color 0.2s;
}
.footer-list a:hover { color: var(--primary); }
.footer-bottom {
  padding-top: 32px; border-top: 1px solid rgba(255,255,255,0.06);
  display: flex; justify-content: space-between; align-items: center;
}
.footer-copy { font-size: 11px; font-weight: 300; color: rgba(255,255,255,0.2); }
.footer-copy a { color: rgba(255,255,255,0.3); text-decoration: none; }
.footer-copy a:hover { color: var(--primary); }

/* ── RESPONSIVE ── */
@media (max-width: 1024px) {
  .products-grid { grid-template-columns: repeat(2, 1fr); }
  .footer-inner { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 768px) {
  .announce-bar { padding: 0 16px; }
  .announce-bar .lang-toggle { position: static; }
  nav { padding: 0 20px; }
  .container { padding: 0 20px; }
  .nav-links-center { display: none; }
  .nav-cta { display: none; }
  .hamburger { display: flex; }
  .hero-content { padding: 48px 24px 64px; }
  .hero-title { font-size: 44px; }
  section { padding: 64px 0; }
  .categories-grid { grid-template-columns: 1fr; }
  .category-card { height: 320px; }
  .about-grid { grid-template-columns: 1fr; gap: 40px; }
  .about-headline { font-size: 44px; }
  .highlights-grid { grid-template-columns: 1fr; }
  .highlight-box { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.08); padding: 40px 24px; }
  .products-grid { grid-template-columns: 1fr; }
  .info-grid { grid-template-columns: 1fr; }
  .info-hours { padding: 0 0 48px; border-right: none; border-bottom: 1px solid var(--line); }
  .info-contact { padding: 48px 0 0; }
  .contact-inner { grid-template-columns: 1fr; }
  .form-grid { grid-template-columns: 1fr; }
  .form-grid .full { grid-column: 1; }
  .reviews-grid { grid-template-columns: 1fr; }
  .footer-inner { grid-template-columns: 1fr; gap: 32px; }
  .footer-bottom { flex-direction: column; gap: 12px; text-align: center; }
  .mobile-menu { padding: 0 24px; }
}
</style>
</head>
<body>

<!-- ANNOUNCEMENT BAR -->
<div class="announce-bar" id="announce-bar">
  <span class="announce-text" id="announce-text"></span>
  <div class="lang-toggle">
    <button class="lang-btn active" data-lang="de" onclick="setLang('de')">DE</button>
    <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
  </div>
</div>

<!-- NAV -->
<nav id="main-nav">
  <a href="#" class="nav-logo" id="nav-logo"></a>
  <ul class="nav-links-center" id="nav-center-links"></ul>
  <a href="#contact" class="nav-cta" id="nav-cta"></a>
  <button class="hamburger" id="hamburger" onclick="toggleMenu()">
    <span></span><span></span><span></span>
  </button>
</nav>

<!-- MOBILE MENU -->
<div class="mobile-menu" id="mobile-menu">
  <button class="mobile-menu-close" onclick="toggleMenu()">×</button>
  <div id="mobile-links"></div>
</div>

<!-- HERO -->
<section id="hero">
  <div class="hero-bg" id="hero-bg"></div>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <span class="hero-eyebrow" id="hero-eyebrow"></span>
    <h1 class="hero-title" id="hero-title"></h1>
    <p class="hero-desc" id="hero-desc"></p>
    <div class="hero-actions">
      <a href="#categories" class="btn-primary" id="hero-cta1"></a>
      <a href="#about" class="btn-outline-white" id="hero-cta2"></a>
    </div>
  </div>
</section>

<!-- CATEGORIES -->
<section id="categories" style="padding-top:0">
  <div class="container" style="padding-top:96px;padding-bottom:48px">
    <div class="section-header">
      <span class="section-label" id="lbl-categories"></span>
      <h2 class="section-title" id="ttl-categories"></h2>
    </div>
  </div>
  <div style="padding:0 4px">
    <div class="categories-grid" id="categories-grid"></div>
  </div>
</section>

<!-- ABOUT -->
<section id="about">
  <div class="container">
    <div class="about-grid">
      <div class="about-left">
        <span class="section-label" id="lbl-about"></span>
        <h2 class="about-headline" id="about-headline"></h2>
      </div>
      <div class="about-right">
        <p class="about-text" id="about-text"></p>
        <ul class="about-highlights" id="about-highlights"></ul>
      </div>
    </div>
  </div>
</section>

<!-- HIGHLIGHTS -->
<section id="highlights">
  <div class="container" style="padding:0">
    <div class="highlights-grid" id="highlights-grid"></div>
  </div>
</section>

<!-- PRODUCTS -->
<section id="products">
  <div class="container">
    <div class="section-header" style="display:flex;justify-content:space-between;align-items:flex-end">
      <div>
        <span class="section-label" id="lbl-products"></span>
        <h2 class="section-title" id="ttl-products"></h2>
      </div>
    </div>
    <div class="products-grid" id="products-grid"></div>
  </div>
</section>

<!-- INFO -->
<section id="info" style="padding:0">
  <div class="container" style="padding:0;max-width:100%">
    <div class="info-grid">
      <div class="info-hours">
        <div style="max-width:460px;margin-left:auto;padding-right:0">
          <span class="section-label" id="lbl-hours"></span>
          <h2 class="section-title" id="ttl-hours"></h2>
          <ul class="hours-list" id="hours-list"></ul>
        </div>
      </div>
      <div class="info-contact">
        <div style="max-width:460px">
          <span class="section-label" id="lbl-location"></span>
          <h2 class="section-title" id="ttl-location"></h2>
          <div class="contact-info" id="contact-info"></div>
          <a href="" class="maps-btn" id="maps-btn" target="_blank" rel="noopener"></a>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- MAP -->
<div id="map"><iframe id="map-iframe" loading="lazy" allowfullscreen referrerpolicy="no-referrer-when-downgrade" title="Karte"></iframe></div>

<!-- CONTACT FORM -->
<section id="contact">
  <div class="container">
    <div class="contact-inner">
      <div class="contact-info-col">
        <span class="section-label" id="lbl-contact"></span>
        <h2 class="section-title" id="ttl-contact"></h2>
        <p class="section-intro" id="desc-contact" style="margin-top:20px"></p>
      </div>
      <div>
        <form id="contact-form" novalidate>
          <div class="form-grid">
            <div class="form-group">
              <label id="lbl-fname"></label>
              <input type="text" id="f-name" required>
            </div>
            <div class="form-group">
              <label id="lbl-femail"></label>
              <input type="email" id="f-email">
            </div>
            <div class="form-group">
              <label id="lbl-fphone"></label>
              <input type="tel" id="f-phone" required>
            </div>
            <div class="form-group">
              <label id="lbl-fdate"></label>
              <input type="date" id="f-date">
            </div>
            <div class="form-group full">
              <label id="lbl-fnotes"></label>
              <textarea id="f-notes" rows="4"></textarea>
            </div>
          </div>
          <button type="submit" class="form-submit" id="btn-send"></button>
          <p class="form-msg" id="form-msg"></p>
        </form>
      </div>
    </div>
  </div>
</section>

<!-- REVIEWS -->
<section id="reviews">
  <div class="container">
    <div class="section-header" style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:40px">
      <div>
        <span class="section-label" id="lbl-reviews"></span>
        <h2 class="section-title" id="ttl-reviews"></h2>
      </div>
    </div>
    <div id="reviews-container"><p class="reviews-empty" id="reviews-loading"></p></div>
  </div>
</section>

<!-- FOOTER -->
<footer>
  <div class="container">
    <div class="footer-inner">
      <div>
        <div class="footer-brand-name" id="footer-name"></div>
        <p class="footer-tagline" id="footer-tagline"></p>
        <div class="footer-social">
          <a href="" id="footer-ig" target="_blank" rel="noopener" title="Instagram">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
          </a>
          <a href="" id="footer-phone-a" title="Telefon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M6.62 10.79a15.05 15.05 0 006.59 6.59l2.2-2.2a1 1 0 011.01-.24c1.12.37 2.33.57 3.58.57a1 1 0 011 1V20a1 1 0 01-1 1C9.39 21 3 14.61 3 7a1 1 0 011-1h3.5a1 1 0 011 1c0 1.25.2 2.45.57 3.57a1 1 0 01-.25 1.02l-2.2 2.2z"/></svg>
          </a>

      </div>
      <div>
        <div class="footer-col-title" id="footer-col-nav"></div>
        <ul class="footer-list" id="footer-nav"></ul>

      <div>
        <div class="footer-col-title" id="footer-col-contact"></div>
        <ul class="footer-list" id="footer-contact-list"></ul>
      </div>
    </div>
    <div class="footer-bottom">
      <p class="footer-copy" id="footer-copy"></p>
      <p class="footer-copy"><a href="impressum/">Impressum</a> · <a href="datenschutz/">Datenschutz</a></p>
    </div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="data.js"></script>
<script>
// ─── GLOBALS ────────────────────────────────────────────────────
const D = window.SITE_DATA;
let lang = localStorage.getItem('lang') || 'de';
function t(obj) { if (!obj) return ''; return obj[lang] || obj.de || ''; }
function setLang(l) {
  lang = l; localStorage.setItem('lang', l);
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === l));
  render();
}

// Apply CSS variables from data
const root = document.documentElement;
if (D.colors) { Object.entries(D.colors).forEach(([k,v]) => root.style.setProperty('--'+k, v)); }
if (D.fonts) {
  if (D.fonts.heading) root.style.setProperty('--font-heading', `'${D.fonts.heading}', sans-serif`);
  if (D.fonts.body)    root.style.setProperty('--font-body', `'${D.fonts.body}', sans-serif`);
}

// ─── SUPABASE ───────────────────────────────────────────────────
const sb = supabase.createClient(D.supabase.url, D.supabase.key);

// ─── NAV SCROLL ─────────────────────────────────────────────────
const mainNav = document.getElementById('main-nav');
window.addEventListener('scroll', () => mainNav.classList.toggle('scrolled', window.scrollY > 60));

// ─── MOBILE MENU ────────────────────────────────────────────────
function toggleMenu() {
  document.getElementById('mobile-menu').classList.toggle('open');
}

// ─── NAV LINKS ──────────────────────────────────────────────────
const navLinks = [
  { de:'Kategorien',   en:'Categories', href:'#categories' },
  { de:'Über uns',     en:'About',      href:'#about' },
  { de:'Sortiment',    en:'Products',   href:'#products' },
  { de:'Öffnungszeiten', en:'Hours',    href:'#info' },
  { de:'Kontakt',      en:'Contact',    href:'#contact' }
];

// ─── RENDER ─────────────────────────────────────────────────────
function render() {
  // SEO
  document.getElementById('seo-title').textContent = D.seo?.title || D.name;
  document.getElementById('seo-desc').content = t(D.seo?.description) || '';
  document.getElementById('seo-og').content = D.seo?.ogImage || '';
  document.title = D.seo?.title || D.name;

  // Announcement bar
  document.getElementById('announce-text').textContent = t(D.announcementBar) || '';

  // Nav
  document.getElementById('nav-logo').textContent = D.name;
  document.getElementById('nav-center-links').innerHTML = navLinks.map(l =>
    `<li><a href="${l.href}">${t(l)}</a></li>`).join('');
  document.getElementById('nav-cta').textContent = lang === 'de' ? 'Kontakt' : 'Contact';
  document.getElementById('mobile-links').innerHTML = [...navLinks,
    {de:'Kontakt', en:'Contact', href:'#contact'}].map(l =>
    `<a href="${l.href}" onclick="toggleMenu()">${t(l)}</a>`).join('');

  // Hero
  const slide = D.slides?.[0] || {};
  document.getElementById('hero-bg').style.backgroundImage = `url('${slide.img || D.photos?.[0] || ''}')`;
  document.getElementById('hero-eyebrow').textContent = t(D.type) || '';
  document.getElementById('hero-title').innerHTML = t(slide.title) || `<em>${D.name}</em>`;
  document.getElementById('hero-desc').textContent = t(slide.desc) || t(D.tagline) || '';
  document.getElementById('hero-cta1').textContent = lang === 'de' ? 'Sortiment entdecken' : 'Discover Products';
  document.getElementById('hero-cta2').textContent = lang === 'de' ? 'Unsere Geschichte' : 'Our Story';

  // Categories
  document.getElementById('lbl-categories').textContent = lang === 'de' ? 'Kollektionen' : 'Collections';
  document.getElementById('ttl-categories').textContent = lang === 'de' ? 'Entdecken Sie unser Sortiment' : 'Discover Our Range';
  const cats = D.categories || [];
  document.getElementById('categories-grid').innerHTML = cats.map(c => `
    <div class="category-card">
      <div class="category-img" style="background-image:url('${c.img||''}')"></div>
      <div class="category-overlay"></div>
      <div class="category-content">
        <div class="category-name">${t(c.name)}</div>
        <a href="#products" class="category-cta">${lang==='de'?'Jetzt entdecken':'Discover now'} →</a>
      </div>
    </div>`).join('');

  // About
  document.getElementById('lbl-about').textContent = lang === 'de' ? 'Unsere Geschichte' : 'Our Story';
  document.getElementById('about-headline').innerHTML = lang === 'de'
    ? `Wien. <em>Qualität.</em><br>Leidenschaft.`
    : `Vienna. <em>Quality.</em><br>Passion.`;
  document.getElementById('about-text').textContent = t(D.about?.text) || '';
  document.getElementById('about-highlights').innerHTML = (D.about?.highlights||[]).map(h =>
    `<li>${t(h)}</li>`).join('');

  // Highlights
  document.getElementById('highlights-grid').innerHTML = (D.highlights||[]).map(h => `
    <div class="highlight-box">
      <span class="highlight-icon">${h.icon||'✦'}</span>
      <div class="highlight-title">${t(h.title)}</div>
      <p class="highlight-desc">${t(h.desc)}</p>
    </div>`).join('');

  // Products / services as products
  document.getElementById('lbl-products').textContent = lang === 'de' ? 'Unser Sortiment' : 'Our Selection';
  document.getElementById('ttl-products').textContent = lang === 'de' ? 'Ausgewählte Produkte' : 'Featured Products';
  const products = D.services || D.products || [];
  document.getElementById('products-grid').innerHTML = products.map(p => `
    <div class="product-card">
      <div class="product-img-wrap">
        <img src="${p.img||''}" alt="${t(p.name)}" class="product-img" loading="lazy"
             onerror="this.parentElement.style.background='var(--bg)'">
      </div>
      <div class="product-info">
        <div class="product-name">${t(p.name)}</div>
        <p class="product-desc">${t(p.desc)}</p>
        ${p.price ? `<span class="product-tag">${p.price}</span>` : ''}
      </div>
    </div>`).join('');

  // Hours
  document.getElementById('lbl-hours').textContent = lang === 'de' ? 'Öffnungszeiten' : 'Opening Hours';
  document.getElementById('ttl-hours').textContent = lang === 'de' ? 'Wann wir für Sie da sind' : 'When We Are Open';
  document.getElementById('hours-list').innerHTML = (D.hours||[]).map(h => `
    <li class="hours-row">
      <span class="hours-day">${t(h.day)}</span>
      ${h.closed
        ? `<span class="hours-closed">${lang==='de'?'Geschlossen':'Closed'}</span>`
        : `<span class="hours-time">${h.time}</span>`}
    </li>`).join('');

  // Location
  document.getElementById('lbl-location').textContent = lang === 'de' ? 'Adresse & Kontakt' : 'Address & Contact';
  document.getElementById('ttl-location').textContent = lang === 'de' ? 'Besuchen Sie uns' : 'Visit Us';
  document.getElementById('contact-info').innerHTML = `
    <div class="contact-row">
      <span class="contact-icon">📍</span>
      <span class="contact-data">${D.address||''}</span>
    </div>
    <div class="contact-row">
      <span class="contact-icon">📞</span>
      <span class="contact-data"><a href="tel:${D.phone||''}">${D.phone||''}</a></span>
    </div>
    <div class="contact-row">
      <span class="contact-icon">✉</span>
      <span class="contact-data"><a href="mailto:${D.email||''}">${D.email||''}</a></span>
    </div>
    <div class="contact-row">
      <span class="contact-icon">📷</span>
      <span class="contact-data"><a href="https://instagram.com/${(D.instagram||'').replace('@','')}" target="_blank">${D.instagram||''}</a></span>
    </div>`;
  const mapsBtn = document.getElementById('maps-btn');
  mapsBtn.href = D.googleMapsUrl || '#';
  mapsBtn.textContent = lang === 'de' ? 'Route planen →' : 'Get Directions →';

  // Map
  const mapIframe = document.getElementById('map-iframe');
  if (D.googleMapsEmbed) mapIframe.src = D.googleMapsEmbed;

  // Contact form
  document.getElementById('lbl-contact').textContent = lang === 'de' ? 'Kontakt' : 'Contact';
  document.getElementById('ttl-contact').textContent = lang === 'de' ? 'Schreiben Sie uns' : 'Get In Touch';
  document.getElementById('desc-contact').textContent = lang === 'de'
    ? 'Fragen, Anfragen oder Feedback — wir freuen uns auf Ihre Nachricht.'
    : 'Questions, enquiries or feedback — we look forward to hearing from you.';
  document.getElementById('lbl-fname').textContent = lang === 'de' ? 'Ihr Name' : 'Your Name';
  document.getElementById('lbl-femail').textContent = lang === 'de' ? 'E-Mail' : 'Email';
  document.getElementById('lbl-fphone').textContent = lang === 'de' ? 'Telefon' : 'Phone';
  document.getElementById('lbl-fdate').textContent = lang === 'de' ? 'Gewünschtes Datum (optional)' : 'Preferred Date (optional)';
  document.getElementById('lbl-fnotes').textContent = lang === 'de' ? 'Ihre Nachricht' : 'Your Message';
  document.getElementById('btn-send').textContent = lang === 'de' ? 'Nachricht senden' : 'Send Message';

  // Reviews labels
  document.getElementById('lbl-reviews').textContent = lang === 'de' ? 'Kundenstimmen' : 'Customer Reviews';
  document.getElementById('ttl-reviews').textContent = lang === 'de' ? 'Was Kunden sagen' : 'What Customers Say';
  document.getElementById('reviews-loading').textContent = lang === 'de' ? 'Bewertungen werden geladen…' : 'Loading reviews…';

  // Footer
  document.getElementById('footer-name').textContent = D.name;
  document.getElementById('footer-tagline').textContent = t(D.tagline);
  document.getElementById('footer-ig').href = 'https://instagram.com/' + (D.instagram||'').replace('@','');
  document.getElementById('footer-phone-a').href = 'tel:' + (D.phone||'');
  document.getElementById('footer-col-nav').textContent = lang === 'de' ? 'Navigation' : 'Navigation';
  document.getElementById('footer-nav').innerHTML = navLinks.map(l =>
    `<li><a href="${l.href}">${t(l)}</a></li>`).join('');
  document.getElementById('footer-col-contact').textContent = lang === 'de' ? 'Kontakt' : 'Contact';
  document.getElementById('footer-contact-list').innerHTML = [
    `<li><a href="tel:${D.phone||''}">${D.phone||''}</a></li>`,
    `<li><a href="mailto:${D.email||''}">${D.email||''}</a></li>`,
    `<li><span style="color:rgba(255,255,255,0.35)">${D.address||''}</span></li>`
  ].join('');
  document.getElementById('footer-copy').innerHTML =
    `&copy; ${new Date().getFullYear()} ${D.name} · <a href="https://web.lokalonline.at">lokalonline.at</a>`;
}

// ─── FORM SUBMIT ────────────────────────────────────────────────
document.getElementById('contact-form').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('btn-send');
  const msg = document.getElementById('form-msg');
  btn.disabled = true;
  btn.textContent = lang === 'de' ? 'Wird gesendet…' : 'Sending…';
  msg.textContent = ''; msg.className = 'form-msg';
  const payload = {
    client_slug: D.slug,
    name:        document.getElementById('f-name').value.trim(),
    phone:       document.getElementById('f-phone').value.trim(),
    date:        document.getElementById('f-date').value || null,
    time:        null,
    guests:      1,
    notes:       document.getElementById('f-notes').value.trim(),
    lang:        lang
  };
  if (!payload.name || !payload.phone) {
    msg.textContent = lang === 'de' ? 'Bitte Name und Telefon angeben.' : 'Please enter your name and phone number.';
    msg.className = 'form-msg err'; btn.disabled = false;
    btn.textContent = lang === 'de' ? 'Nachricht senden' : 'Send Message';
    return;
  }
  const { error } = await sb.from('reservations').insert([payload]);
  btn.disabled = false;
  btn.textContent = lang === 'de' ? 'Nachricht senden' : 'Send Message';
  if (error) {
    msg.textContent = lang === 'de' ? 'Fehler beim Senden. Bitte versuchen Sie es erneut.' : 'Error sending. Please try again.';
    msg.className = 'form-msg err';
  } else {
    msg.textContent = lang === 'de' ? 'Vielen Dank für Ihre Nachricht!' : 'Thank you for your message!';
    msg.className = 'form-msg ok';
    e.target.reset();
  }
});

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
// ─── LOAD REVIEWS ────────────────────────────────────────────────
async function loadReviews() {
  const { data, error } = await sb.from('reviews')
    .select('*')
    .eq('client_slug', D.reviewSlug)
    .order('created_at', { ascending: false })
    .limit(6);
  const container = document.getElementById('reviews-container');
  if (error || !data || data.length === 0) {
    container.innerHTML = `<p class="reviews-empty">${lang==='de'?'Noch keine Bewertungen vorhanden.':'No reviews yet.'}</p>`;
    return;
  }
  container.innerHTML = `<div class="reviews-grid">${data.map(r => `
    <div class="review-card">
      <div class="review-stars">${'★'.repeat(r.rating||5)}${'☆'.repeat(5-(r.rating||5))}</div>
      <p class="review-text">"${esc(r.text || r.comment || '')}"</p>
      <div class="review-author">${esc(r.name || r.author || 'Anonym')}</div>
    </div>`).join('')}</div>`;
}

// ─── INIT ────────────────────────────────────────────────────────
render();
loadReviews();
</script>
</body>
</html>
